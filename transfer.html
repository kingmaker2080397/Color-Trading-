<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAKER GOLD - Instant Transfer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3b82f6; --bg: #070b14; --card: #1e293b; --gold: #fbbf24; }
        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; padding: 20px; text-align: center; margin: 0; }
        
        .box { 
            background: var(--card); padding: 35px 25px; border-radius: 25px; 
            border: 1px solid var(--primary); box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            margin-top: 20px;
        }
        
        .balance-preview { margin-bottom: 20px; color: var(--gold); font-size: 14px; }
        
        input { 
            width: 100%; padding: 16px; margin: 12px 0; border-radius: 12px; 
            border: 1px solid #334155; background: #0f172a; color: white; 
            box-sizing: border-box; font-size: 16px; outline: none;
        }
        input:focus { border-color: var(--gold); }

        .btn { 
            width: 100%; padding: 16px; background: var(--primary); border: none; 
            border-radius: 12px; color: white; font-weight: bold; 
            cursor: pointer; font-size: 16px; transition: 0.3s; margin-top: 10px;
        }
        .btn:disabled { background: #475569; cursor: not-allowed; }
        
        .note { font-size: 12px; color: #94a3b8; margin-top: 20px; line-height: 1.5; }
    </style>
</head>
<body>

    <h2 style="margin-top: 20px;">🔗 Instant Transfer</h2>
    <p style="color: #94a3b8; font-size: 14px;">Send money to other Maker Gold users</p>

    <div class="box">
        <div class="balance-preview">Your Balance: <span id="myWallet">₹ 0.00</span></div>
        
        <input type="number" id="recPhone" placeholder="Receiver Mobile Number">
        <input type="number" id="transAmt" placeholder="Amount (Minimum ₹100)">
        
        <button id="sendBtn" class="btn" onclick="sendNow()">SEND NOW</button>
        
        <div class="note">
            ⚠️ <b>Note:</b> Transfers are permanent and cannot be reversed. Please double-check the receiver's number.
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get, update, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCh-1xi3jkIj5hUsmbm3GFGfT_AlWmxYkk",
            authDomain: "maker-trading-official.firebaseapp.com",
            databaseURL: "https://maker-trading-official-default-rtdb.firebaseio.com/",
            projectId: "maker-trading-official",
            appId: "1:262205995192:web:d7255379855a0fc9489c4d"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const myPhone = localStorage.getItem("userPhone");

        if(!myPhone) window.location.href = "login.html";

        // Real-time Balance Show
        onValue(ref(db, 'users/' + myPhone), (snap) => {
            if(snap.exists()) {
                document.getElementById('myWallet').innerText = "₹ " + (snap.val().wallet || 0).toFixed(2);
            }
        });

        window.sendNow = async () => {
            const rPhone = document.getElementById('recPhone').value.trim();
            const amt = parseFloat(document.getElementById('transAmt').value);
            const btn = document.getElementById('sendBtn');
            
            if(rPhone === myPhone) { alert("You cannot send money to yourself!"); return; }
            if(isNaN(amt) || amt < 100) { alert("Minimum transfer amount is ₹100"); return; }

            btn.disabled = true;
            btn.innerText = "Processing...";

            try {
                const mySnap = await get(ref(db, 'users/' + myPhone));
                const rSnap = await get(ref(db, 'users/' + rPhone));

                if (!rSnap.exists()) {
                    alert("Receiver account not found!");
                    btn.disabled = false;
                    btn.innerText = "SEND NOW";
                    return;
                }

                const myBalance = parseFloat(mySnap.val().wallet || 0);
                const rBalance = parseFloat(rSnap.val().wallet || 0);

                if (myBalance >= amt) {
                    // Update Balances
                    const updates = {};
                    updates['users/' + myPhone + '/wallet'] = myBalance - amt;
                    updates['users/' + rPhone + '/wallet'] = rBalance + amt;

                    // Add History Records
                    const transID = push(ref(db, 'transfers')).key;
                    const log = {
                        sender: myPhone,
                        receiver: rPhone,
                        amount: amt,
                        timestamp: Date.now(),
                        type: "User Transfer"
                    };

                    await update(ref(db, '/'), updates);
                    // Optional: Save logs for records.html
                    await push(ref(db, 'user_history/' + myPhone), { ...log, status: "SENT" });
                    await push(ref(db, 'user_history/' + rPhone), { ...log, status: "RECEIVED" });

                    alert("Successfully Transferred ₹" + amt + " to " + rPhone);
                    document.getElementById('transAmt').value = "";
                    document.getElementById('recPhone').value = "";
                } else {
                    alert("Insufficient Balance!");
                }
            } catch (error) {
                console.error(error);
                alert("Transfer failed! Please check your connection.");
            } finally {
                btn.disabled = false;
                btn.innerText = "SEND NOW";
            }
        };
    </script>
</body>
</html>
