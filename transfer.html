<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfer - Maker Gold</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3b82f6; --bg: #070b14; --card: #1e293b; --gold: #fbbf24; }
        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; padding: 20px; text-align: center; margin: 0; }
        
        .header { padding: 20px 0; display: flex; align-items: center; justify-content: space-between; }
        .back-btn { text-decoration: none; color: var(--gold); font-size: 20px; }

        .box { 
            background: var(--card); padding: 30px 20px; border-radius: 25px; 
            border: 1px solid rgba(59, 130, 246, 0.2); box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            margin-top: 10px;
        }
        
        .wallet-display { background: rgba(251, 191, 36, 0.05); padding: 15px; border-radius: 15px; border: 1px dashed var(--gold); margin-bottom: 20px; }
        .wallet-display span { display: block; font-size: 10px; color: #94a3b8; letter-spacing: 1px; }
        .wallet-display b { font-size: 24px; color: var(--gold); }
        
        .input-group { text-align: left; margin-bottom: 15px; }
        label { font-size: 11px; color: #94a3b8; margin-left: 5px; }
        
        input { 
            width: 100%; padding: 16px; margin-top: 5px; border-radius: 12px; 
            border: 1px solid #334155; background: #0f172a; color: white; 
            box-sizing: border-box; font-size: 16px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); }

        #receiverName { font-size: 11px; color: #22c55e; margin-top: 5px; display: none; font-weight: bold; }

        .btn { 
            width: 100%; padding: 18px; background: var(--primary); border: none; 
            border-radius: 15px; color: white; font-weight: 800; 
            cursor: pointer; font-size: 15px; transition: 0.3s; margin-top: 10px;
            letter-spacing: 1px; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }
        .btn:active { transform: scale(0.97); }
        .btn:disabled { background: #475569; box-shadow: none; }
        
        .warning-note { font-size: 10px; color: #ef4444; margin-top: 20px; background: rgba(239, 68, 68, 0.05); padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <a href="home.html" class="back-btn">❮</a>
        <h3 style="margin: 0; letter-spacing: 1px;">P2P TRANSFER</h3>
        <div style="width: 20px;"></div>
    </div>

    <div class="box">
        <div class="wallet-display">
            <span>YOUR CURRENT BALANCE</span>
            <b id="myWallet">$ 0.00</b>
        </div>
        
        <div class="input-group">
            <label>RECEIVER'S MOBILE NUMBER</label>
            <input type="number" id="recPhone" placeholder="Enter phone number" oninput="verifyUser()">
            <div id="receiverName">● Verified Receiver Found</div>
        </div>

        <div class="input-group">
            <label>AMOUNT TO SEND ($)</label>
            <input type="number" id="transAmt" placeholder="Min $10.00">
        </div>
        
        <button id="sendBtn" class="btn" onclick="sendNow()">CONFIRM TRANSFER</button>
        
        <div class="warning-note">
            🛡️ <b>Security Alert:</b> Funds are moved instantly. This action is irreversible. Ensure the receiver's identity.
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get, update, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCh-1xi3jkIj5hUsmbm3GFGfT_AlWmxYkk",
            databaseURL: "https://maker-trading-official-default-rtdb.firebaseio.com/" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const myPhone = localStorage.getItem("userPhone");

        if(!myPhone) window.location.href = "login.html";

        // 1. Balance Sync
        onValue(ref(db, 'users/' + myPhone + '/wallet'), (snap) => {
            const bal = snap.val() || 0;
            document.getElementById('myWallet').innerText = "$ " + parseFloat(bal).toFixed(2);
        });

        // 2. Auto-Verify Receiver
        window.verifyUser = async () => {
            const rPhone = document.getElementById('recPhone').value.trim();
            const nameLabel = document.getElementById('receiverName');
            
            if(rPhone.length >= 10) {
                const snap = await get(ref(db, 'users/' + rPhone));
                if(snap.exists()) {
                    nameLabel.style.display = "block";
                    nameLabel.innerText = "✓ Account Verified (" + rPhone + ")";
                    nameLabel.style.color = "#22c55e";
                } else {
                    nameLabel.style.display = "block";
                    nameLabel.innerText = "✗ Account not found";
                    nameLabel.style.color = "#ef4444";
                }
            } else {
                nameLabel.style.display = "none";
            }
        };

        // 3. Transfer Logic
        window.sendNow = async () => {
            const rPhone = document.getElementById('recPhone').value.trim();
            const amt = parseFloat(document.getElementById('transAmt').value);
            const btn = document.getElementById('sendBtn');
            
            if(rPhone === myPhone) return alert("Error: Self-transfer not allowed!");
            if(isNaN(amt) || amt < 10) return alert("Minimum transfer is $10");

            btn.disabled = true;
            btn.innerText = "Securing Transaction...";

            try {
                const mySnap = await get(ref(db, 'users/' + myPhone));
                const rSnap = await get(ref(db, 'users/' + rPhone));

                if (!rSnap.exists()) {
                    alert("Receiver not found in Maker Gold network!");
                    resetBtn();
                    return;
                }

                const myBalance = parseFloat(mySnap.val().wallet || 0);
                const rBalance = parseFloat(rSnap.val().wallet || 0);

                if (myBalance >= amt) {
                    const updates = {};
                    updates['users/' + myPhone + '/wallet'] = myBalance - amt;
                    updates['users/' + rPhone + '/wallet'] = rBalance + amt;

                    // History Log
                    const logData = {
                        amount: amt,
                        timestamp: Date.now(),
                        type: "Transfer",
                        date: new Date().toLocaleDateString()
                    };

                    await update(ref(db), updates);
                    
                    // Specific History for records.html
                    await push(ref(db, 'user_history/' + myPhone), { ...logData, choice: "Transfer OUT", status: "LOSS", periodId: "TRF-" + rPhone.slice(-4) });
                    await push(ref(db, 'user_history/' + rPhone), { ...logData, choice: "Transfer IN", status: "WIN", periodId: "TRF-" + myPhone.slice(-4) });

                    alert("Transaction Successful! $" + amt + " sent to " + rPhone);
                    document.getElementById('transAmt').value = "";
                    document.getElementById('recPhone').value = "";
                    document.getElementById('receiverName').style.display = "none";
                } else {
                    alert("Insufficient Wallet Balance!");
                }
            } catch (error) {
                alert("Network timeout. Please check your connection.");
            } finally {
                resetBtn();
            }
        };

        function resetBtn() {
            const btn = document.getElementById('sendBtn');
            btn.disabled = false;
            btn.innerText = "CONFIRM TRANSFER";
        }
    </script>
</body>
</html>
