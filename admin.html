<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maker Gold | Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a; --surface: #1e293b; --accent: #fbbf24; --accent-dark: #b45309;
            --success: #22c55e; --danger: #ef4444; --text-main: #f8fafc; --text-dim: #94a3b8;
        }
        body { background-color: var(--bg); color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 600px; }
        header { text-align: center; margin-bottom: 30px; }
        header h1 { color: var(--accent); font-size: 24px; letter-spacing: 2px; text-transform: uppercase; margin: 0; }
        header p { color: var(--text-dim); font-size: 12px; }
        .section { background: var(--surface); border-radius: 16px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        h2 { font-size: 14px; font-weight: 600; color: var(--accent); margin-top: 0; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .timer-box { background: rgba(0,0,0,0.3); border-radius: 12px; padding: 20px; text-align: center; border: 1px dashed var(--accent); }
        .timer-val { font-size: 48px; font-weight: 700; color: var(--accent); text-shadow: 0 0 15px rgba(251, 191, 36, 0.3); }
        input { width: 100%; padding: 12px 15px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: white; margin-bottom: 12px; box-sizing: border-box; }
        .btn-grid { display: flex; gap: 10px; margin-top: 10px; }
        .btn { cursor: pointer; border: none; border-radius: 8px; padding: 12px; font-weight: 600; font-size: 13px; text-transform: uppercase; transition: 0.2s; }
        .btn-green { background: var(--success); color: white; flex: 1; }
        .btn-red { background: var(--danger); color: white; flex: 1; }
        .btn-gold { background: var(--accent); color: #000; width: 100%; }
        .req-box { background: #1e293b; border: 1px solid #334155; padding: 15px; border-radius: 12px; margin-bottom: 12px; position: relative; }
        .badge { font-size: 10px; padding: 3px 8px; border-radius: 4px; background: var(--accent); color: #000; font-weight: bold; position: absolute; top: 15px; right: 15px; }
        .user-info { font-size: 14px; font-weight: 600; }
        .amount-info { font-size: 18px; color: var(--success); margin: 5px 0; }
        .details { font-size: 12px; color: var(--text-dim); }
        .status-bar { font-size: 11px; text-align: center; padding: 5px; border-radius: 5px; margin-top: 10px; background: rgba(251, 191, 36, 0.1); color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Maker Gold</h1>
        <p>Master Administration Engine • v2.0</p>
    </header>

    <div class="section">
        <h2>🎮 Live Game Control</h2>
        <div class="timer-box">
            <div class="timer-val" id="timerDisp">60s</div>
            <div id="modeLabel" class="status-bar">STATUS: AUTO MODE</div>
        </div>
        <div class="btn-grid">
            <button class="btn btn-green" onclick="forceNext('Green')">Force Green</button>
            <button class="btn btn-red" onclick="forceNext('Red')">Force Red</button>
        </div>
    </div>

    <div class="section">
        <h2>💰 Financial Distribution</h2>
        <div style="display:flex; gap:10px; align-items: flex-end;">
            <div style="flex:1">
                <label style="font-size: 11px; color: var(--text-dim);">Withdrawal Fee (%)</label>
                <input type="number" id="feeInput" value="5" style="margin-bottom:0;">
            </div>
            <button class="btn btn-gold" style="width:auto; padding: 12px 20px;" onclick="distributeProfit()">Distribute Profit</button>
        </div>
    </div>

    <div class="section">
        <h2>⚙️ Payment Gateway Settings</h2>
        <input type="text" id="methodTitle" placeholder="Method (e.g. Binance / JazzCash)">
        <input type="text" id="methodAddr" placeholder="Wallet Address or Number">
        <button class="btn btn-gold" onclick="updateDepositDetails()">Update System Info</button>
    </div>

    <div class="section">
        <h2>📥 Pending Deposits</h2>
        <div id="depList" class="details">Scanning...</div>
    </div>

    <div class="section">
        <h2>📤 Withdrawal Requests</h2>
        <div id="withList" class="details">Scanning...</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, update, onValue, get, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCh-1xi3jkIj5hUsmbm3GFGfT_AlWmxYkk", 
        databaseURL: "https://maker-trading-official-default-rtdb.firebaseio.com/" 
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let timeLeft = 60;
    let forcedRes = "AUTO";

    // 1. Timer Logic
    setInterval(() => {
        timeLeft--;
        if (timeLeft <= 0) {
            const finalWin = (forcedRes === "AUTO") ? (['Red', 'Green'][Math.floor(Math.random()*2)]) : forcedRes;
            update(ref(db, 'game_state'), {
                lastResult: finalWin, timer: 60,
                activePeriod: new Date().getTime().toString().slice(-6),
                forcedResult: "AUTO"
            });
            timeLeft = 60; forcedRes = "AUTO";
            document.getElementById('modeLabel').innerText = "STATUS: AUTO MODE";
        } else {
            update(ref(db, 'game_state'), { timer: timeLeft });
        }
        document.getElementById('timerDisp').innerText = timeLeft + "s";
    }, 1000);

    window.forceNext = (c) => { 
        forcedRes = c; 
        document.getElementById('modeLabel').innerText = "TARGET LOCKED: " + c;
        update(ref(db, 'game_state'), { forcedResult: c });
    };

    // 2. Deposit Approval
    onValue(ref(db, 'deposit_requests'), (snap) => {
        const cont = document.getElementById('depList');
        cont.innerHTML = "";
        if(!snap.exists()) { cont.innerHTML = "No pending deposits."; return; }
        snap.forEach(child => {
            const d = child.val();
            cont.innerHTML += `
                <div class="req-box">
                    <span class="badge">DEPOSIT</span>
                    <div class="user-info">User: ${d.phone}</div>
                    <div class="amount-info">$${d.amount}</div>
                    <div class="details">TRX: ${d.trx}</div>
                    <div class="btn-grid">
                        <button class="btn btn-green" onclick="approveDep('${d.phone}', ${d.amount}, '${child.key}')">Approve</button>
                        <button class="btn btn-red" onclick="rejectReq('deposit_requests', '${child.key}')">Decline</button>
                    </div>
                </div>`;
        });
    });

    window.approveDep = async (ph, amt, key) => {
        const s = await get(ref(db, `users/${ph}/wallet`));
        await update(ref(db, `users/${ph}`), { wallet: (s.val() || 0) + amt });
        await remove(ref(db, `deposit_requests/${key}`));
        alert("Deposit Approved!");
    };

    // 3. Withdrawal with Fees Logic
    onValue(ref(db, 'withdraw_requests'), (snap) => {
        const cont = document.getElementById('withList');
        cont.innerHTML = "";
        if(!snap.exists()) { cont.innerHTML = "No pending withdrawals."; return; }
        const feeP = document.getElementById('feeInput').value;
        snap.forEach(child => {
            const w = child.val();
            const feeAmt = (w.amount * (feeP/100)).toFixed(2);
            const net = (w.amount - feeAmt).toFixed(2);
            cont.innerHTML += `
                <div class="req-box">
                    <span class="badge" style="background:#ef4444; color:white;">WITHDRAW</span>
                    <div class="user-info">User: ${w.phone}</div>
                    <div class="amount-info" style="color:white;">$${w.amount}</div>
                    <div class="details" style="color:#ef4444;">Fee: -$${feeAmt} | <b>Pay: $${net}</b></div>
                    <div class="btn-grid">
                        <button class="btn btn-green" onclick="rejectReq('withdraw_requests', '${child.key}')">Mark Paid</button>
                    </div>
                </div>`;
        });
    });

    // 4. Profit Distribution
    window.distributeProfit = async () => {
        const snap = await get(ref(db, 'user_investments'));
        if(!snap.exists()) return alert("No active stakers!");
        let total = 0;
        for(let ph in snap.val()){
            for(let k in snap.val()[ph]){
                const i = snap.val()[ph][k];
                if(i.status === "Locked"){
                    const p = i.amount * 0.012;
                    const uRef = ref(db, `users/${ph}`);
                    const uSnap = await get(uRef);
                    await update(uRef, { wallet: (uSnap.val().wallet || 0) + p });
                    total += p;
                }
            }
        }
        alert(`Profit Distributed: $${total.toFixed(2)}`);
    };

    window.updateDepositDetails = () => {
        update(ref(db, 'admin_settings/payment_info'), { 
            name: document.getElementById('methodTitle').value, 
            address: document.getElementById('methodAddr').value 
        });
        alert("Settings Saved!");
    };

    window.rejectReq = async (p, k) => { await remove(ref(db, `${p}/${k}`)); };
</script>
</body>
    </html>
