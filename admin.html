<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MASTER ADMIN - MAKER GOLD</title>
    <style>
        body { background: #070b14; color: white; font-family: sans-serif; padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #334155; }
        input, select, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: none; }
        button { font-weight: bold; cursor: pointer; }
        .btn-appr { background: #22c55e; color: white; }
        .btn-rejt { background: #ef4444; color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; border-bottom: 1px solid #334155; text-align: left; font-size: 12px; }
    </style>
</head>
<body>

    <h1>🚀 MASTER CONTROL PANEL</h1>

    <div class="card">
        <h2>🎯 TRADE MANIPULATION</h2>
        <select id="gameFix">
            <option value="none">AUTO MODE</option>
            <option value="Big">FORCE BIG</option>
            <option value="Small">FORCE SMALL</option>
        </select>
        <button class="btn-rejt" onclick="fixGame()">FIX NEXT RESULT</button>
    </div>

    <div class="card">
        <h2>📋 KYC APPROVALS</h2>
        <table id="kycTable">
            <thead><tr><th>Phone</th><th>Name</th><th>Action</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="card">
        <h2>🏧 WITHDRAWALS</h2>
        <table id="withdrawTable">
            <thead><tr><th>User</th><th>Amount</th><th>Action</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, update, onValue, remove, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyCh-1xi3jkIj5hUsmbm3GFGfT_AlWmxYkk", databaseURL: "https://maker-trading-official-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.fixGame = () => {
            const val = document.getElementById('gameFix').value;
            if(val === "none") remove(ref(db, 'game_control/next_fix'));
            else set(ref(db, 'game_control/next_fix'), val);
            alert("Trade Control Applied!");
        };

        onValue(ref(db, 'kyc_requests'), (snap) => {
            const tbody = document.querySelector("#kycTable tbody");
            tbody.innerHTML = "";
            snap.forEach(child => {
                const d = child.val();
                tbody.innerHTML += `<tr><td>${d.phone}</td><td>${d.name}</td>
                <td><button class="btn-appr" onclick="manageKYC('${d.phone}', 'Approved')">Approve</button></td></tr>`;
            });
        });

        window.manageKYC = (ph, stat) => {
            update(ref(db, 'users/' + ph), { kycStatus: stat });
            remove(ref(db, 'kyc_requests/' + ph));
            alert("KYC Approved!");
        };

        onValue(ref(db, 'withdraw_requests'), (snap) => {
            const tbody = document.querySelector("#withdrawTable tbody");
            tbody.innerHTML = "";
            snap.forEach(child => {
                const d = child.val();
                tbody.innerHTML += `<tr><td>${d.phone}</td><td>${d.finalPayout}</td>
                <td><button class="btn-appr" onclick="doneW('${child.key}')">Paid</button></td></tr>`;
            });
        });

        window.doneW = (id) => { remove(ref(db, 'withdraw_requests/' + id)); alert("Paid!"); };
    </script>
</body>
</html>
