<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Maker Gold</title>
    <style>
        body { background: #070b14; color: white; font-family: sans-serif; padding: 15px; }
        .box { background: #1e293b; padding: 20px; border-radius: 20px; border: 1px solid #3b82f6; margin-bottom: 15px; }
        .pool-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .p-box { padding: 15px; border-radius: 12px; text-align: center; font-weight: bold; border: 1px solid #334155; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .f-green { background: #22c55e; } .f-red { background: #ef4444; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; }
    </style>
</head>
<body>
    <h2 style="text-align:center;">🛠️ ADMIN PANEL</h2>
    
    <div class="box">
        <p>Period: <b id="period">Loading...</b> | Timer: <b id="timer" style="color: #fbbf24;">00s</b></p>
        <div class="pool-grid">
            <div class="p-box" style="color:#22c55e;">Green Pool<br><span id="gAmt">₹0</span></div>
            <div class="p-box" style="color:#ef4444;">Red Pool<br><span id="rAmt">₹0</span></div>
        </div>
        <button class="btn f-green" onclick="force('Green')">FORCE GREEN WIN</button>
        <button class="btn f-red" onclick="force('Red')">FORCE RED WIN</button>
        <p style="text-align:center; font-size:12px; color:#94a3b8; margin-top:10px;">Status: <span id="status">AUTO</span></p>
    </div>

    <div class="box">
        <h3>💰 USDT Address</h3>
        <input type="text" id="usdtInput" placeholder="New TRC20 Address">
        <button class="btn" style="background:#3b82f6;" onclick="updateUSDT()">UPDATE ADDRESS</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyCh-1xi3jkIj5hUsmbm3GFGfT_AlWmxYkk", databaseURL: "https://maker-trading-official-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        onValue(ref(db, 'game_state'), (snap) => {
            const d = snap.val();
            document.getElementById('period').innerText = d.activePeriod;
            document.getElementById('timer').innerText = d.timer + "s";
            document.getElementById('gAmt').innerText = "₹" + (d.greenPool || 0);
            document.getElementById('rAmt').innerText = "₹" + (d.redPool || 0);
            document.getElementById('status').innerText = d.forcedResult || "AUTO";
        });

        window.force = (color) => {
            update(ref(db, 'game_state'), { forcedResult: color });
            alert("Result Forced: " + color);
        };

        window.updateUSDT = () => {
            const val = document.getElementById('usdtInput').value;
            update(ref(db, 'admin_settings'), { usdt_address: val }).then(() => alert("USDT Updated!"));
        };
    </script>
</body>
</html>
