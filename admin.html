<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maker Admin Control</title>
    <style>
        body { background: #070b14; color: white; font-family: sans-serif; padding: 20px; }
        .box { background: #1e293b; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #3b82f6; }
        .kyc-card { background: #0f172a; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; }
        .btn-green { background: #22c55e; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .btn-red { background: #ef4444; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <h2>🛠️ ADMIN CONTROL CENTER</h2>

    <div class="box">
        <h3>💰 Deposit Settings (USDT)</h3>
        <p style="font-size:12px; color:#94a3b8;">Current address will be shown to users on recharge page.</p>
        <input type="text" id="newUsdt" placeholder="Enter New USDT TRC20 Address">
        <button class="btn-green" onclick="updateUSDT()">UPDATE ADDRESS</button>
    </div>

    <div class="box">
        <h3>🆔 Pending KYC Requests</h3>
        <div id="kycList">Loading...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCh-1xi3jkIj5hUsmbm3GFGfT_AlWmxYkk",
            databaseURL: "https://maker-trading-official-default-rtdb.firebaseio.com/" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Update USDT
        window.updateUSDT = () => {
            const val = document.getElementById('newUsdt').value;
            if(!val) return alert("Enter address!");
            update(ref(db, 'admin_settings'), { usdt_address: val })
            .then(() => alert("USDT Address Updated!"));
        };

        // Load KYC
        onValue(ref(db, 'kyc_requests'), (snap) => {
            const list = document.getElementById('kycList');
            list.innerHTML = "";
            if(!snap.exists()) { list.innerHTML = "No pending requests."; return; }
            
            snap.forEach(child => {
                const d = child.val();
                list.innerHTML += `
                    <div class="kyc-card">
                        <p><b>User:</b> ${d.phone} | <b>Name:</b> ${d.name}</p>
                        <p><b>ID No:</b> ${d.idNumber}</p>
                        <a href="${d.photoUrl}" target="_blank" style="color:#fbbf24;">[ VIEW ID CARD PHOTO ]</a><br><br>
                        <button class="btn-green" onclick="actionKYC('${d.phone}', 'Verified')">Approve</button>
                        <button class="btn-red" onclick="actionKYC('${d.phone}', 'Rejected')">Reject</button>
                    </div>
                `;
            });
        });

        window.actionKYC = (uPhone, status) => {
            update(ref(db, 'users/' + uPhone), { kycStatus: status });
            remove(ref(db, 'kyc_requests/' + uPhone));
            alert("User " + status);
        };
    </script>
</body>
</html>
