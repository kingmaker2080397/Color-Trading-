<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Control Panel - Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #070b14; color: white; font-family: 'Poppins', sans-serif; padding: 20px; text-align: center; }
        .card { background: #1e293b; padding: 25px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #334155; }
        .timer-box { font-size: 50px; color: #fbbf24; font-weight: bold; margin: 15px 0; }
        .btn { padding: 15px 30px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin: 5px; width: 140px; }
        .btn-green { background: #22c55e; color: white; }
        .btn-red { background: #ef4444; color: white; }
        .btn-blue { background: #3b82f6; color: white; width: 100%; margin-top: 15px; }
        select { background: #0f172a; color: white; padding: 10px; width: 100%; border-radius: 10px; border: 1px solid #3b82f6; }
        h2 { color: #fbbf24; border-bottom: 1px solid #334155; padding-bottom: 10px; }
    </style>
</head>
<body>

    <h1>🛠️ MASTER CONTROL PANEL</h1>

    <div class="card">
        <h2>🎮 Win Go 1Min Control</h2>
        <div class="p-info">Period ID: <b id="periodID">--</b> | Timer: <span id="timerBox" class="timer-box">0s</span></div>
        
        <div style="margin-top:20px;">
            <button class="btn btn-green" onclick="forceResult('Green')">FORCE GREEN</button>
            <button class="btn btn-red" onclick="forceResult('Red')">FORCE RED</button>
        </div>
        <p style="margin-top:10px; color: #94a3b8;">Forced Next: <b id="forcedStatus" style="color:white;">AUTO</b></p>
    </div>

    <div class="card">
        <h2>📈 Market Mood (Risk Management)</h2>
        <select id="marketTrend">
            <option value="AUTO">Normal (Auto Random)</option>
            <option value="BULLISH">Bullish (Users Win More 📈)</option>
            <option value="BEARISH">Bearish (Users Loss 📉)</option>
        </select>
        <button class="btn btn-blue" onclick="setTrend()">SET MARKET TREND</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, update, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCh-1xi3jkIj5hUsmbm3GFGfT_AlWmxYkk", 
            databaseURL: "https://maker-trading-official-default-rtdb.firebaseio.com/" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let timeLeft = 60;
        let activePeriod = new Date().getTime().toString().slice(-6);
        let nextForce = "AUTO";

        // --- TIMER ENGINE (The most important part) ---
        setInterval(() => {
            timeLeft--;
            
            if (timeLeft <= 0) {
                // Period Change Logic
                const colors = ['Red', 'Green'];
                const randomResult = colors[Math.floor(Math.random() * colors.length)];
                
                // Final Result Decide Karo
                let finalWin = (nextForce === "AUTO") ? randomResult : nextForce;

                update(ref(db, 'game_state'), {
                    lastResult: finalWin,
                    timer: 60,
                    activePeriod: new Date().getTime().toString().slice(-6)
                });

                timeLeft = 60;
                nextForce = "AUTO"; // Reset force after round ends
                document.getElementById('forcedStatus').innerText = "AUTO";
            } else {
                // Sirf Timer Update Karo
                update(ref(db, 'game_state'), {
                    timer: timeLeft,
                    forcedResult: nextForce
                });
            }
            
            // Local Display Update
            document.getElementById('timerBox').innerText = timeLeft + "s";
        }, 1000);

        // Sync Period ID on UI
        onValue(ref(db, 'game_state/activePeriod'), (snap) => {
            document.getElementById('periodID').innerText = snap.val() || "--";
        });

        // Forced Result Functions
        window.forceResult = (color) => {
            nextForce = color;
            document.getElementById('forcedStatus').innerText = color;
            update(ref(db, 'game_state'), { forcedResult: color });
            alert("Next Result Forced to: " + color);
        };

        // Market Trend Logic
        window.setTrend = () => {
            const trend = document.getElementById('marketTrend').value;
            update(ref(db, 'app_settings'), { market_mood: trend });
            alert("Market Trend set to: " + trend);
        };

    </script>
</body>
</html>
