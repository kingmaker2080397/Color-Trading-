<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAKER MASTER ADMIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #0f172a; color: white; font-family: 'Poppins', sans-serif; margin: 0; padding: 15px; }
        .tab-btn { padding: 10px 20px; background: #1e293b; border: 1px solid #3b82f6; color: white; cursor: pointer; border-radius: 10px; margin-right: 5px; }
        .active-tab { background: #3b82f6; font-weight: bold; }
        .card { background: #1e293b; padding: 20px; border-radius: 15px; margin-top: 15px; border-bottom: 4px solid #3b82f6; }
        .req-item { background: #0f172a; padding: 15px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #334155; }
        .btn-approve { background: #22c55e; border: none; padding: 8px 15px; color: white; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-reject { background: #ef4444; border: none; padding: 8px 15px; color: white; border-radius: 5px; cursor: pointer; font-weight: bold; margin-left: 5px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        span.amount { color: #fbbf24; font-weight: bold; }
    </style>
</head>
<body>

    <h2 style="color:#fbbf24; text-align:center;">🛠️ MAKER MASTER CONTROL</h2>

    <div style="display: flex; overflow-x: auto; padding-bottom: 10px;">
        <button class="tab-btn active-tab" onclick="showTab('game')">Game</button>
        <button class="tab-btn" onclick="showTab('deposit')">Deposits</button>
        <button class="tab-btn" onclick="showTab('invest')">Invests</button>
    </div>

    <div id="gameTab" class="card">
        <h3>Live Pool | Period: <span id="pId">...</span></h3>
        <div class="stats-grid">
            <div style="color:#22c55e;">Green: <br>₹<span id="gt">0</span></div>
            <div style="color:#ef4444;">Red: <br>₹<span id="rt">0</span></div>
        </div>
        <p>Timer: <span id="timer" style="color:#fbbf24;">00s</span></p>
        <button class="btn-approve" style="width:100%; margin-top:10px;" onclick="force('Green')">FORCE GREEN WIN</button>
        <button class="btn-reject" style="width:100%; margin-top:10px; margin-left:0;" onclick="force('Red')">FORCE RED WIN</button>
    </div>

    <div id="depositTab" class="card" style="display:none;">
        <h3>Pending Deposits</h3>
        <div id="depositList">Loading...</div>
    </div>

    <div id="investTab" class="card" style="display:none;">
        <h3>Active Stakings</h3>
        <div id="investList">Loading...</div>
        <button class="btn-approve" style="width:100%; margin-top:15px; background:#3b82f6;" onclick="distributeProfit()">DISTRIBUTE DAILY PROFIT</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, get, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCh-1xi3jkIj5hUsmbm3GFGfT_AlWmxYkk",
            authDomain: "maker-trading-official.firebaseapp.com",
            databaseURL: "https://maker-trading-official-default-rtdb.firebaseio.com/",
            projectId: "maker-trading-official",
            appId: "1:262205995192:web:d7255379855a0fc9489c4d"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Tab Switching
        window.showTab = (t) => {
            document.querySelectorAll('.card').forEach(c => c.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
            document.getElementById(t+'Tab').style.display = 'block';
            event.target.classList.add('active-tab');
        };

        // Live Game Timer & Pool
        setInterval(() => {
            let now = new Date();
            let remSec = 29 - (now.getSeconds() % 30);
            let periodId = now.getFullYear().toString() + (now.getMonth()+1).toString().padStart(2,'0') + now.getDate().toString().padStart(2,'0') + now.getHours().toString().padStart(2,'0') + now.getMinutes().toString().padStart(2,'0') + (Math.floor(now.getSeconds() / 30));
            document.getElementById('pId').innerText = periodId;
            document.getElementById('timer').innerText = remSec + "s";
            
            get(ref(db, 'bets/' + periodId)).then(snap => {
                let g=0, r=0;
                if(snap.exists()) {
                    snap.forEach(c => {
                        if(c.val().choice === 'Green') g += c.val().amount;
                        if(c.val().choice === 'Red') r += c.val().amount;
                    });
                }
                document.getElementById('gt').innerText = g;
                document.getElementById('rt').innerText = r;
            });
        }, 1000);

        // Deposit Approval Logic
        onValue(ref(db, 'deposits'), (snap) => {
            const list = document.getElementById('depositList');
            list.innerHTML = "";
            if(!snap.exists()) list.innerHTML = "No pending deposits.";
            snap.forEach(child => {
                const dep = child.val();
                const utr = child.key;
                list.innerHTML += `
                    <div class="req-item">
                        <p>User: ${dep.phone} | Amt: <span class="amount">₹${dep.amount}</span></p>
                        <p>UTR: ${utr}</p>
                        <button class="btn-approve" onclick="approveDep('${dep.phone}', ${dep.amount}, '${utr}')">APPROVE</button>
                        <button class="btn-reject" onclick="rejectDep('${utr}')">REJECT</button>
                    </div>
                `;
            });
        });

        window.approveDep = async (uPhone, amt, utr) => {
            const snap = await get(ref(db, 'users/' + uPhone));
            if(snap.exists()){
                await update(ref(db, 'users/' + uPhone), { balance: snap.val().balance + amt });
                await remove(ref(db, 'deposits/' + utr));
                alert("Approved! Balance added to " + uPhone);
            }
        };

        window.rejectDep = (utr) => remove(ref(db, 'deposits/' + utr));

        // Profit Distribution Logic
        window.distributeProfit = async () => {
            const snap = await get(ref(db, 'users'));
            let count = 0;
            snap.forEach(u => {
                const data = u.val();
                if(data.investment && data.investment.status === "Active") {
                    let profit = (data.investment.amount * data.investment.dailyRate) / 100;
                    update(ref(db, 'users/' + u.key), { balance: data.balance + profit });
                    count++;
                }
            });
            alert("Profit shared with " + count + " investors!");
        };
    </script>
</body>
</html>
