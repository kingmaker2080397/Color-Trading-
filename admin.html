<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin - Maker Gold</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #3b82f6; --bg: #070b14; --card: #1e293b; --green: #22c55e; --red: #ef4444; }
        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; padding: 15px; margin:0; }
        .box { background: var(--card); padding: 20px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #334155; }
        h3 { color: var(--blue); margin-top: 0; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-green { background: var(--green); }
        .btn-red { background: var(--red); }
        .btn-blue { background: var(--blue); }
        .list-item { background: #0f172a; padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 4px solid var(--blue); font-size: 13px; }
        .flex { display: flex; gap: 10px; margin-top: 10px; }
    </style>
</head>
<body>

    <h2 style="text-align:center;">🛠️ MASTER ADMIN</h2>

    <div class="box">
        <h3>🎮 Game Control</h3>
        <p>Period: <b id="period">--</b> | Timer: <b id="timer" style="color:var(--blue)">00s</b></p>
        <div class="flex">
            <button class="btn btn-green" onclick="force('Green')">FORCE GREEN</button>
            <button class="btn btn-red" onclick="force('Red')">FORCE RED</button>
        </div>
        <p style="text-align:center; font-size:12px;">Current Status: <b id="forceStatus">AUTO</b></p>
    </div>

    <div class="box">
        <h3>💰 Payment Manager</h3>
        <label>Easypaisa (Name - Number):</label>
        <input type="text" id="adm_ep" placeholder="Coming Soon">
        <label>JazzCash (Name - Number):</label>
        <input type="text" id="adm_jc" placeholder="Coming Soon">
        <label>USDT TRC20 Address:</label>
        <input type="text" id="adm_usdt" placeholder="Coming Soon">
        <button class="btn btn-blue" onclick="savePayments()">UPDATE PAYMENTS</button>
    </div>

    <div class="box">
        <h3>📥 Pending Deposits</h3>
        <div id="depList">Loading...</div>
    </div>

    <div class="box">
        <h3>🆔 KYC Requests</h3>
        <div id="kycList">Loading...</div>
    </div>

    <div class="box">
        <h3>📤 Withdrawal Requests</h3>
        <div id="withdrawList">Loading...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, get, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyCh-1xi3jkIj5hUsmbm3GFGfT_AlWmxYkk", databaseURL: "https://maker-trading-official-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- GAME LOGIC ---
        onValue(ref(db, 'game_state'), (snap) => {
            const d = snap.val() || {};
            document.getElementById('period').innerText = d.activePeriod || "--";
            document.getElementById('timer').innerText = (d.timer || 0) + "s";
            document.getElementById('forceStatus').innerText = d.forcedResult || "AUTO";
        });
        window.force = (c) => update(ref(db, 'game_state'), { forcedResult: c });

        // --- PAYMENT MANAGER ---
        window.savePayments = () => {
            update(ref(db, 'admin_settings/payments'), {
                easypaisa: document.getElementById('adm_ep').value || "Coming Soon",
                jazzcash: document.getElementById('adm_jc').value || "Coming Soon",
                usdt: document.getElementById('adm_usdt').value || "Coming Soon"
            }).then(() => alert("Payments Updated!"));
        };
        onValue(ref(db, 'admin_settings/payments'), (snap) => {
            const d = snap.val() || {};
            document.getElementById('adm_ep').value = d.easypaisa === "Coming Soon" ? "" : d.easypaisa;
            document.getElementById('adm_jc').value = d.jazzcash === "Coming Soon" ? "" : d.jazzcash;
            document.getElementById('adm_usdt').value = d.usdt === "Coming Soon" ? "" : d.usdt;
        });

        // --- DEPOSIT APPROVAL ---
        onValue(ref(db, 'deposits'), (snap) => {
            let html = "";
            snap.forEach(child => {
                const d = child.val();
                if(d.status === "Pending") {
                    html += `<div class="list-item">User: ${d.user}<br>Amt: ₹${d.amount}<br>TID: ${d.tid}
                    <div class="flex"><button class="btn btn-green" onclick="approveDep('${child.key}','${d.user}',${d.amount})">✔</button>
                    <button class="btn btn-red" onclick="rejectData('deposits/${child.key}')">✖</button></div></div>`;
                }
            });
            document.getElementById('depList').innerHTML = html || "No Pending Deposits";
        });

        window.approveDep = async (key, phone, amt) => {
            const snap = await get(ref(db, 'users/' + phone));
            const bal = (snap.val().wallet || 0) + amt;
            await update(ref(db, 'users/' + phone), { wallet: bal });
            await update(ref(db, 'deposits/' + key), { status: "Approved" });
            alert("Deposit Added!");
        };

        // --- KYC APPROVAL ---
        onValue(ref(db, 'users'), (snap) => {
            let html = "";
            snap.forEach(user => {
                const d = user.val();
                if(d.kycStatus === "Pending") {
                    html += `<div class="list-item">User: ${user.key}<br>Name: ${d.realName}<br>Method: ${d.withdrawalMethod}<br>Detail: ${d.withdrawalDetail}
                    <button class="btn btn-blue" onclick="updateStatus('users/${user.key}', {kycStatus:'Verified'})">VERIFY KYC</button></div>`;
                }
            });
            document.getElementById('kycList').innerHTML = html || "No Pending KYC";
        });

        // --- WITHDRAWAL APPROVAL ---
        onValue(ref(db, 'withdrawals'), (snap) => {
            let html = "";
            snap.forEach(child => {
                const d = child.val();
                if(d.status === "Pending") {
                    html += `<div class="list-item">User: ${d.user}<br>Amt: ₹${d.amount}<br>Target: ${d.address}
                    <div class="flex"><button class="btn btn-green" onclick="updateStatus('withdrawals/${child.key}', {status:'Approved'})">APPROVE</button>
                    <button class="btn btn-red" onclick="rejectWithdraw('${child.key}','${d.user}',${d.amount})">REJECT</button></div></div>`;
                }
            });
            document.getElementById('withdrawList').innerHTML = html || "No Pending Withdrawals";
        });

        window.updateStatus = (path, data) => update(ref(db, path), data);
        window.rejectData = (path) => remove(ref(db, path));
        window.rejectWithdraw = async (key, phone, amt) => {
            const snap = await get(ref(db, 'users/' + phone));
            await update(ref(db, 'users/' + phone), { wallet: (snap.val().wallet || 0) + amt });
            await remove(ref(db, 'withdrawals/' + key));
            alert("Withdraw Rejected & Refunded");
        };
    </script>
</body>
</html>
