<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recharge - Maker Trading</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f9fafb; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .pay-box { background: #e0f2fe; padding: 15px; border-radius: 10px; margin: 15px 0; border: 1px dashed #0369a1; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: #1e3a8a; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Recharge Wallet</h3>
        <p>Send amount to below details:</p>
        <div class="pay-box">
            <strong>Method:</strong> EasyPaisa / JazzCash<br>
            <strong>Number:</strong> 03xx-xxxxxxx (Admin)<br>
            <strong>Title:</strong> MAKER TRADING
        </div>
        <input type="number" id="amt" placeholder="Enter Amount Paid">
        <input type="text" id="tid" placeholder="Transaction ID (TID)">
        <p style="font-size: 12px;">Upload payment screenshot to our Telegram for fast approval.</p>
        <button class="btn" id="subBtn">Submit Request</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCh-1xi3jkIj5hUsmbm3GFGfT_AlWmxYkk",
            authDomain: "maker-trading-official.firebaseapp.com",
            databaseURL: "https://maker-trading-official-default-rtdb.firebaseio.com/",
            projectId: "maker-trading-official",
            appId: "1:262205995192:web:d7255379855a0fc9489c4d"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        document.getElementById('subBtn').onclick = function() {
            const amount = document.getElementById('amt').value;
            const tid = document.getElementById('tid').value;
            const phone = localStorage.getItem("userPhone");

            if(amount < 100) { alert("Minimum recharge is ₹100"); return; }

            const reqRef = ref(db, 'rechargeRequests/' + tid);
            set(reqRef, {
                user: phone,
                amount: amount,
                tid: tid,
                status: "Pending",
                time: new Date().toLocaleString()
            }).then(() => {
                alert("Request Submitted! Admin will verify soon.");
                window.location.href = "profile.html";
            });
        };
    </script>
</body>
</html>
