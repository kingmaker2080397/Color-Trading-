<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stake Assets - Maker Gold</title>
    <style>
        :root { --bg: #070b14; --card: #1e293b; --gold: #fbbf24; --blue: #3b82f6; }
        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; padding: 15px; }
        .wallet-card { background: linear-gradient(135deg, #1e3a8a, #1e293b); padding: 20px; border-radius: 20px; border: 1px solid var(--blue); margin-bottom: 20px; text-align: center; }
        .input-group { background: var(--card); padding: 15px; border-radius: 15px; margin-top: 15px; }
        input { width: 100%; background: transparent; border: none; border-bottom: 2px solid var(--blue); color: white; padding: 10px; font-size: 18px; outline: none; margin-top: 10px; }
        .btn-stake { width: 100%; background: var(--gold); color: black; padding: 15px; border-radius: 15px; border: none; font-weight: bold; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="wallet-card">
        <p style="margin:0; font-size:12px; color:#94a3b8;">AVAILABLE WALLET BALANCE</p>
        <h1 id="userBal">$ 0.00</h1>
    </div>

    <div class="input-group">
        <label style="font-size: 14px; color: var(--gold);">Enter Staking Amount ($)</label>
        <input type="number" id="stakeAmt" placeholder="Min $10">
        <p style="font-size: 11px; color: #94a3b8; margin-top: 10px;">Daily Return: 0.5% - 1.2% (Auto-Compounding)</p>
    </div>

    <button class="btn-stake" onclick="startStake()">STAKE NOW</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, get, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyCh-1xi3jkIj5hUsmbm3GFGfT_AlWmxYkk", databaseURL: "https://maker-trading-official-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const phone = localStorage.getItem("userPhone");

        // Wallet Balance Load Karo
        onValue(ref(db, `users/${phone}/wallet`), (snap) => {
            const bal = snap.val() || 0;
            document.getElementById('userBal').innerText = "$ " + bal.toFixed(2);
        });

        window.startStake = async () => {
            const amt = parseFloat(document.getElementById('stakeAmt').value);
            const userSnap = await get(ref(db, `users/${phone}`));
            const currentBal = userSnap.val().wallet || 0;

            if (amt < 10) return alert("Minimum stake is $10");
            if (amt > currentBal) return alert("Insufficient balance in wallet!");

            // Deduct from Wallet & Add to Investment
            const newBal = currentBal - amt;
            await update(ref(db, `users/${phone}`), { wallet: newBal });
            
            const invRef = ref(db, `user_investments/${phone}`);
            await push(invRef, {
                amount: amt,
                planName: "Standard Stake",
                dailyProfit: 0.8,
                status: "Locked",
                timestamp: Date.now()
            });

            alert("Staking Successful! Your $ " + amt + " is now active.");
            location.href = "dashboard.html";
        };
    </script>
</body>
</html>
