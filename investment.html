<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAKER - Staking Nodes</title>
    <style>
        body { background: #070b14; color: white; font-family: sans-serif; padding: 15px; }
        .portfolio { background: linear-gradient(135deg, #1e293b, #0f172a); padding: 20px; border-radius: 20px; border: 1px solid #3b82f6; margin-bottom: 20px; }
        .node-card { background: #1e293b; padding: 20px; border-radius: 20px; margin-bottom: 15px; border-left: 5px solid #fbbf24; }
        .invest-btn { width: 100%; padding: 12px; background: #fbbf24; border: none; border-radius: 10px; font-weight: bold; }
        .nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #111827; display: flex; justify-content: space-around; padding: 15px 0; }
    </style>
</head>
<body>
    <div class="portfolio">
        <p style="color:#94a3b8; margin:0;">MY TOTAL STAKED</p>
        <h2 id="stakedDisplay" style="color:#3b82f6;">₹ 0.00</h2>
        <p id="lockInfo" style="font-size:12px; color:#fbbf24;">No Active Investment</p>
    </div>

    <h3>Available Nodes</h3>
    <div class="node-card">
        <h4>Silver Node (0.5% Daily)</h4>
        <input type="number" id="amt1" placeholder="Min ₹500" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:none;">
        <button class="invest-btn" onclick="stake(500, 7, 0.5, 'amt1')">INVEST NOW</button>
    </div>

    <div class="nav">
        <a href="home.html" style="color:white; text-decoration:none;">🏠 Home</a>
        <a href="investment.html" style="color:#3b82f6; text-decoration:none;">💰 Invest</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, get, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCh-1xi3jkIj5hUsmbm3GFGfT_AlWmxYkk",
            authDomain: "maker-trading-official.firebaseapp.com",
            databaseURL: "https://maker-trading-official-default-rtdb.firebaseio.com/",
            projectId: "maker-trading-official",
            appId: "1:262205995192:web:d7255379855a0fc9489c4d"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const phone = localStorage.getItem("userPhone");

        onValue(ref(db, 'users/' + phone), (snap) => {
            const d = snap.val();
            if(d.investment && d.investment.status === "Active") {
                document.getElementById('stakedDisplay').innerText = "₹ " + d.investment.amount;
                let daysLeft = Math.ceil((d.investment.unlockDate - Date.now()) / (1000*60*60*24));
                document.getElementById('lockInfo').innerText = "Unlocks in: " + (daysLeft > 0 ? daysLeft : 0) + " Days";
            }
        });

        window.stake = async (min, days, rate, inp) => {
            const amt = parseFloat(document.getElementById(inp).value);
            const s = await get(ref(db, 'users/' + phone));
            if(s.val().balance >= amt && amt >= min) {
                const unlock = Date.now() + (days * 24 * 60 * 60 * 1000);
                update(ref(db, 'users/' + phone), {
                    balance: s.val().balance - amt,
                    investment: { amount: amt, dailyRate: rate, unlockDate: unlock, status: "Active" }
                });
                alert("Staked Successfully!");
            } else { alert("Check balance/min amount!"); }
        };
    </script>
</body>
</html>
