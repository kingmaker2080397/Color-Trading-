<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staking Hub - Maker Gold</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3b82f6; --bg: #070b14; --card: #1e293b; --gold: #fbbf24; --green: #22c55e; --red: #ef4444; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: white; padding: 15px; }
        
        .tab-container { display: flex; background: var(--card); border-radius: 15px; margin-bottom: 20px; padding: 5px; }
        .tab { flex: 1; padding: 12px; border-radius: 12px; cursor: pointer; transition: 0.3s; font-weight: 600; font-size: 14px; }
        .tab.active { background: var(--primary); color: white; }

        .plan-card { 
            background: linear-gradient(145deg, #1e293b, #0f172a); padding: 20px; border-radius: 25px; 
            border: 1px solid rgba(255,255,255,0.05); margin-bottom: 15px; text-align: left; position: relative;
        }
        .mode-badge { position: absolute; top: 15px; right: 15px; font-size: 10px; padding: 4px 10px; border-radius: 20px; font-weight: bold; }
        
        .profit-val { font-size: 24px; font-weight: bold; margin: 10px 0; }
        .locked { color: var(--gold); }
        .flexi { color: var(--green); }

        .btn-invest { width: 100%; padding: 15px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 0 rgba(0,0,0,0.3); }
        .btn-locked { background: var(--primary); color: white; }
        .btn-flexi { background: var(--green); color: white; }
        
        .risk-text { font-size: 11px; color: #94a3b8; margin-top: 5px; }
    </style>
</head>
<body>

    <h2 style="text-align:center;">💰 Investment Hub</h2>

    <div class="tab-container">
        <div id="tab1" class="tab active" onclick="switchTab('locked')">🔒 LOCKED</div>
        <div id="tab2" class="tab" onclick="switchTab('flexi')">📈 FLEXIBLE</div>
    </div>

    <div id="lockedSection">
        <div class="plan-card">
            <span class="mode-badge" style="background:rgba(251,191,36,0.2); color:var(--gold);">FIXED</span>
            <h3 style="margin:0;">Standard Saver</h3>
            <div class="profit-val locked">Daily 0.5% - 1.2%</div>
            <p style="font-size:12px; color:#94a3b8;">Min: $50 | Duration: 30 Days (Locked)</p>
            <button class="btn-invest btn-locked" onclick="invest('locked_std')">STAKE NOW</button>
            <p class="risk-text">🛡️ Capital is 100% protected in locked mode.</p>
        </div>
    </div>

    <div id="flexiSection" style="display:none;">
        <div class="plan-card">
            <span class="mode-badge" style="background:rgba(34,197,94,0.2); color:var(--green);">MARKET</span>
            <h3 style="margin:0;">AI Market Bot</h3>
            <div id="marketProfit" class="profit-val flexi">Daily -2% to +5%</div>
            <p style="font-size:12px; color:#94a3b8;">Min: $10 | No Lock-in Period</p>
            <button class="btn-invest btn-flexi" onclick="invest('flexi_ai')">START TRADING</button>
            <p class="risk-text">⚠️ High Risk: Profit/Loss depends on market volatility.</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyCh-1xi3jkIj5hUsmbm3GFGfT_AlWmxYkk", databaseURL: "https://maker-trading-official-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Tab Switching Logic
        window.switchTab = (mode) => {
            if(mode === 'locked') {
                document.getElementById('lockedSection').style.display = 'block';
                document.getElementById('flexiSection').style.display = 'none';
                document.getElementById('tab1').classList.add('active');
                document.getElementById('tab2').classList.remove('active');
            } else {
                document.getElementById('lockedSection').style.display = 'none';
                document.getElementById('flexiSection').style.display = 'block';
                document.getElementById('tab1').classList.remove('active');
                document.getElementById('tab2').classList.add('active');
            }
        };

        // Live Market Volatility (Fake or Admin Controlled)
        onValue(ref(db, 'admin_settings/market_status'), (snap) => {
            const status = snap.val() || "Normal";
            const profitEl = document.getElementById('marketProfit');
            if(status === "Bullish") {
                profitEl.innerText = "Current: +4.2%";
                profitEl.style.color = "var(--green)";
            } else if(status === "Bearish") {
                profitEl.innerText = "Current: -1.5%";
                profitEl.style.color = "var(--red)";
            } else {
                profitEl.innerText = "Daily -2% to +5%";
                profitEl.style.color = "var(--green)";
            }
        });

        window.invest = (plan) => {
            alert("Redirecting to payment for " + plan);
            location.href = 'deposit.html';
        };
    </script>
</body>
</html>
