<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Win Go 1Min - Pro Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --blue: #1e40af; --bg: #030712; --card: #111827; 
            --gold: #fbbf24; --green: #10b981; --red: #f43f5e; 
            --glass: rgba(255, 255, 255, 0.03);
        }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: #f3f4f6; overflow-x: hidden; }
        .game-header { background: linear-gradient(180deg, #1e3a8a 0%, var(--bg) 100%); padding: 40px 20px; border-bottom: 1px solid var(--glass); }
        .balance-card { background: var(--glass); backdrop-filter: blur(10px); margin: 0 auto; max-width: 400px; padding: 25px; border-radius: 24px; border: 1px solid rgba(251, 191, 36, 0.3); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .timer-card { background: var(--card); margin: -20px 20px 20px 20px; padding: 25px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); border: 1px solid var(--glass); }
        .timer-val { font-size: 55px; color: var(--gold); font-weight: 700; letter-spacing: -2px; font-variant-numeric: tabular-nums; text-align: center; }
        .bet-container { padding: 0 20px; max-width: 500px; margin: 0 auto; }
        .input-wrapper { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid #1f2937; margin-bottom: 20px; }
        input[type="number"] { width: 100%; background: #030712; border: 2px solid #374151; padding: 15px; border-radius: 12px; color: var(--gold); font-size: 20px; text-align: center; font-weight: 600; outline: none; }
        .btn-grid { display: flex; gap: 15px; margin-bottom: 30px; }
        .bet-btn { flex: 1; padding: 18px; border-radius: 16px; border: none; color: white; font-weight: 600; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .btn-green { background: var(--green); box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); }
        .btn-red { background: var(--red); box-shadow: 0 4px 15px rgba(244, 63, 94, 0.3); }
        #resPop { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; backdrop-filter: blur(12px); }
        .pop-card { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1f2937; width: 85%; max-width: 350px; padding: 40px 20px; border-radius: 32px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
    </style>
</head>
<body>

    <div id="resPop">
        <div class="pop-card">
            <div id="popEmoji" style="font-size: 70px; margin-bottom: 10px;">🎉</div>
            <h2 id="popTitle" style="font-size: 28px; margin: 0;">YOU WIN!</h2>
            <p id="popDesc" style="color: #94a3b8; margin: 15px 0; font-size: 14px;"></p>
            <button onclick="closePopup()" style="width:100%; background:var(--gold); padding:16px; border-radius:15px; border:none; font-weight:bold; cursor:pointer; color:#000;">BET AGAIN</button>
        </div>
    </div>

    <div class="game-header">
        <div class="balance-card">
            <div style="font-size: 11px; color: #94a3b8; letter-spacing: 2px;">AVAILABLE BALANCE</div>
            <div style="font-size: 32px; font-weight: 700; color: var(--gold); margin-top: 5px;" id="walletDisp">$ 0.00</div>
        </div>
    </div>

    <div class="timer-card">
        <div style="display:flex; justify-content:space-between; font-size:12px; color:#6b7280; font-weight:600;">
            <span>ID: <b id="periodID" style="color:var(--gold)">--</b></span>
            <span>TIME REMAINING</span>
        </div>
        <div id="timerDisplay" class="timer-val">00:60</div>
    </div>

    <div class="bet-container">
        <div class="input-wrapper">
            <div style="font-size: 11px; color: #6b7280; margin-bottom: 10px; font-weight: 600;">TRADE AMOUNT ($1 - $20)</div>
            <input type="number" id="betAmountInput" value="1" min="1" max="20">
        </div>

        <div class="btn-grid">
            <button class="bet-btn btn-green" onclick="placeTrade('Green')">JOIN GREEN</button>
            <button class="bet-btn btn-red" onclick="placeTrade('Red')">JOIN RED</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, get, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCh-1xi3jkIj5hUsmbm3GFGfT_AlWmxYkk", 
            databaseURL: "https://maker-trading-official-default-rtdb.firebaseio.com/" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const phone = localStorage.getItem("userPhone") || "0000000000";

        let activeBet = null;
        let activeAmount = 0;
        let currentPeriod = "";

        // Wallet Sync
        onValue(ref(db, `users/${phone}/wallet`), (snap) => {
            document.getElementById('walletDisp').innerText = "$ " + parseFloat(snap.val() || 0).toFixed(2);
        });

        // Game Engine Sync
        onValue(ref(db, 'game_state'), async (snap) => {
            const data = snap.val();
            if(!data) return;

            let time = parseInt(data.timer);
            document.getElementById('timerDisplay').innerText = `00:${time < 10 ? '0'+time : time}`;
            
            // Period change detect karna
            if (data.activePeriod !== currentPeriod) {
                if (activeBet !== null) {
                    processResult(data.lastResult);
                }
                currentPeriod = data.activePeriod;
                document.getElementById('periodID').innerText = currentPeriod;
            }
        });

        window.placeTrade = async (color) => {
            const amt = parseFloat(document.getElementById('betAmountInput').value);
            if(amt < 1 || amt > 20 || isNaN(amt)) return alert("Limit: $1 to $20");

            const userSnap = await get(ref(db, `users/${phone}`));
            const balance = userSnap.val().wallet || 0;

            if(amt > balance) return alert("Low Balance!");

            activeBet = color;
            activeAmount = amt;
            alert(`Trade Set: ${color} ($${amt})`);
        };

        async function processResult(winColor) {
            const userRef = ref(db, `users/${phone}`);
            const snap = await get(userRef);
            let wallet = parseFloat(snap.val().wallet) || 0;

            if(activeBet === winColor) {
                let profit = activeAmount * 0.9;
                await update(userRef, { wallet: wallet + profit });
                showPop("YOU WIN!", "#10b981", "🎉", `Profit: +$${profit.toFixed(2)}`);
            } else {
                await update(userRef, { wallet: wallet - activeAmount });
                showPop("YOU LOSE", "#f43f5e", "💔", `Loss: -$${activeAmount.toFixed(2)}`);
            }
            activeBet = null;
        }

        function showPop(t, c, e, d) {
            document.getElementById('popTitle').innerText = t;
            document.getElementById('popTitle').style.color = c;
            document.getElementById('popEmoji').innerText = e;
            document.getElementById('popDesc').innerText = d;
            document.getElementById('resPop').style.display = 'block';
        }

        window.closePopup = () => document.getElementById('resPop').style.display = 'none';
    </script>
</body>
</html>
