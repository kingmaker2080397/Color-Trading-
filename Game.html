<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Win Go - Maker Gold</title>
    <style>
        :root { --primary: #3b82f6; --bg: #070b14; --card: #1e293b; --gold: #fbbf24; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: white; text-align: center; }
        .card { background: var(--card); margin: 15px; padding: 20px; border-radius: 25px; border-bottom: 4px solid var(--primary); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .timer { font-size: 40px; color: var(--gold); font-weight: bold; text-shadow: 0 0 10px rgba(251,191,36,0.3); }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .btn { padding: 20px; border: none; border-radius: 15px; font-weight: bold; color: white; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .green { background: linear-gradient(135deg, #22c55e, #16a34a); box-shadow: 0 6px 0 #15803d; }
        .red { background: linear-gradient(135deg, #ef4444, #dc2626); box-shadow: 0 6px 0 #b91c1c; }
        .btn:active { transform: translateY(4px); box-shadow: none; }
        
        /* Popup System */
        #gamePop { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; }
        .pop-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1e293b; width: 280px; padding: 30px; border-radius: 30px; border: 2px solid var(--gold); text-align: center; }
        .pop-btn { background: var(--gold); border: none; padding: 10px 40px; border-radius: 20px; font-weight: bold; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="gamePop">
        <div class="pop-content">
            <h1 id="popIcon" style="font-size: 60px; margin: 0;">🏆</h1>
            <h2 id="popTitle">RESULT</h2>
            <p id="popMsg">Checking your trade...</p>
            <button class="pop-btn" onclick="document.getElementById('gamePop').style.display='none'">OK</button>
        </div>
    </div>

    <div style="padding: 20px; background: linear-gradient(180deg, #1e40af, #070b14);">
        <h2>Win Go 1Min</h2>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between;">
            <div style="text-align:left;"><small style="color:#94a3b8;">Period ID</small><br><b id="pId" style="color:var(--primary);">--------</b></div>
            <div style="text-align:right;"><small style="color:#94a3b8;">Timer</small><br><div class="timer" id="timer">00:00</div></div>
        </div>
    </div>

    <div class="btn-grid">
        <button class="btn green" onclick="placeTrade('Green')">JOIN GREEN</button>
        <button class="btn red" onclick="placeTrade('Red')">JOIN RED</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, set, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyCh-1xi3jkIj5hUsmbm3GFGfT_AlWmxYkk", databaseURL: "https://maker-trading-official-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const phone = localStorage.getItem("userPhone");

        window.showPop = (title, msg, icon, color) => {
            document.getElementById('popTitle').innerText = title;
            document.getElementById('popMsg').innerText = msg;
            document.getElementById('popIcon').innerText = icon;
            document.getElementById('popTitle').style.color = color;
            document.getElementById('gamePop').style.display = 'block';
        };

        onValue(ref(db, 'game_state'), (snap) => {
            const d = snap.val();
            document.getElementById('pId').innerText = d.activePeriod;
            document.getElementById('timer').innerText = "00:" + (d.timer < 10 ? "0"+d.timer : d.timer);
        });

        window.placeTrade = (color) => {
            const amt = prompt("Enter Amount (₹):", "100");
            if(!amt || amt < 10) return;
            const period = document.getElementById('pId').innerText;
            set(push(ref(db, 'bets/' + period)), { user: phone, amount: parseFloat(amt), color: color });
            showPop("SUCCESS", "Trade Placed on " + color, "✅", "#22c55e");
            setTimeout(() => { document.getElementById('gamePop').style.display='none'; }, 1500);
        };
    </script>
</body>
</html>
