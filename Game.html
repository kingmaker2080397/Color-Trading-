<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Win Go 1Min - Official Trading</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #1e3a8a; --bg: #070b14; --card: #1e293b; --gold: #fbbf24; --green: #22c55e; --red: #ef4444; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: white; text-align: center; }
        .game-header { background: linear-gradient(180deg, #1e40af, var(--bg)); padding: 30px 20px; }
        .balance-card { background: rgba(255,255,255,0.05); margin: 0 20px; padding: 20px; border-radius: 15px; border: 1px solid var(--gold); }
        .timer-card { background: var(--card); margin: 20px; padding: 30px; border-radius: 30px; border-bottom: 4px solid var(--gold); }
        .timer-val { font-size: 60px; color: var(--gold); font-weight: bold; font-family: 'Courier New', monospace; }
        
        /* Trade Input Section */
        .trade-input-box { margin: 20px; padding: 15px; background: var(--card); border-radius: 15px; border: 1px solid #334155; }
        .trade-input-box input { width: 80%; padding: 10px; border-radius: 10px; border: 1px solid var(--gold); background: #0f172a; color: white; text-align: center; font-size: 18px; outline: none; }
        
        .btn-grid { display: flex; justify-content: center; gap: 15px; margin: 10px 20px; }
        .bet-btn { flex: 1; padding: 20px; border-radius: 20px; border: none; color: white; font-weight: bold; font-size: 18px; cursor: pointer; text-transform: uppercase; }
        .btn-green { background: var(--green); box-shadow: 0 6px 0 #15803d; }
        .btn-red { background: var(--red); box-shadow: 0 6px 0 #991b1b; }
        
        #resPop { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; backdrop-filter: blur(8px); }
        .pop-card { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1e293b; width: 320px; padding: 40px 20px; border-radius: 40px; border: 2px solid var(--gold); text-align: center; }
    </style>
</head>
<body>

    <div id="resPop">
        <div class="pop-card">
            <div id="popEmoji" style="font-size: 80px;">🎉</div>
            <h2 id="popTitle" style="font-size: 32px; margin: 0;">YOU WIN!</h2>
            <p id="popDesc" style="color: #94a3b8; margin-top: 15px;">Result updated in your wallet.</p>
            <button onclick="document.getElementById('resPop').style.display='none'" style="background:var(--gold); padding:15px 50px; border-radius:30px; border:none; font-weight:bold; margin-top:30px; cursor:pointer;">CONTINUE</button>
        </div>
    </div>

    <div class="game-header">
        <div class="balance-card">
            <div style="font-size: 12px; color: #94a3b8;">ACCOUNT BALANCE</div>
            <div style="font-size: 28px; font-weight: bold; color: var(--gold);" id="walletDisp">$ 0.00</div>
        </div>
    </div>

    <div class="timer-card">
        <div style="display:flex; justify-content:space-between; font-size:13px; color:#94a3b8; margin-bottom:10px;">
            <span>Period ID: <b id="periodID" style="color:var(--gold)">Wait...</b></span>
            <span>Timer</span>
        </div>
        <div id="timerDisplay" class="timer-val">00:00</div>
    </div>

    <div class="trade-input-box">
        <p style="font-size: 12px; color: #94a3b8; margin-bottom: 8px;">ENTER TRADE AMOUNT ($1 - $20)</p>
        <input type="number" id="betAmountInput" value="1" min="1" max="20" placeholder="Max $20">
    </div>

    <div class="btn-grid">
        <button class="bet-btn btn-green" onclick="placeTrade('Green')">Join Green</button>
        <button class="bet-btn btn-red" onclick="placeTrade('Red')">Join Red</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, get, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCh-1xi3jkIj5hUsmbm3GFGfT_AlWmxYkk", 
            databaseURL: "https://maker-trading-official-default-rtdb.firebaseio.com/" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const phone = localStorage.getItem("userPhone");

        let activeBet = null;
        let activeAmount = 0;
        let lastPeriod = "";

        // 1. Live Wallet Sync
        onValue(ref(db, `users/${phone}/wallet`), (snap) => {
            const val = snap.val() || 0;
            document.getElementById('walletDisp').innerText = "$ " + parseFloat(val).toFixed(2);
        });

        // 2. Timer & Game Logic
        onValue(ref(db, 'game_state'), async (snap) => {
            const data = snap.val();
            if(!data) return;

            let time = parseInt(data.timer) || 0;
            document.getElementById('timerDisplay').innerText = `00:${time < 10 ? '0'+time : time}`;
            document.getElementById('periodID').innerText = data.activePeriod || "---";

            // Result Check at 2s
            if(time === 2 && activeBet !== null && data.activePeriod !== lastPeriod) {
                lastPeriod = data.activePeriod;
                const winColor = (data.forcedResult === "AUTO" || !data.forcedResult) ? data.lastResult : data.forcedResult;
                processTradeResult(winColor);
            }
        });

        // 3. Place Trade with $1 - $20 Validation
        window.placeTrade = async (color) => {
            const amt = parseFloat(document.getElementById('betAmountInput').value);
            
            // Validation
            if(isNaN(amt) || amt < 1) return alert("Minimum trade is $1");
            if(amt > 20) return alert("Maximum trade is $20");

            const userSnap = await get(ref(db, `users/${phone}`));
            const currentBal = userSnap.val().wallet || 0;

            if(amt > currentBal) return alert("Insufficient Balance!");

            activeBet = color;
            activeAmount = amt;
            alert(`Trade Locked: ${color} for $${amt}`);
        };

        // 4. Final Result Calculation
        async function processTradeResult(winColor) {
            const userRef = ref(db, `users/${phone}`);
            const snap = await get(userRef);
            let currentWallet = parseFloat(snap.val().wallet) || 0;

            const pop = document.getElementById('resPop');
            if(activeBet === winColor) {
                let winProfit = activeAmount * 0.9; // 90% Profit
                await update(userRef, { wallet: currentWallet + winProfit });
                setPopUI("YOU WIN!", "#22c55e", "🎉", `+$${winProfit.toFixed(2)} added.`);
            } else {
                await update(userRef, { wallet: currentWallet - activeAmount });
                setPopUI("YOU LOSE", "#ef4444", "💔", `-$${activeAmount.toFixed(2)} deducted.`);
            }
            pop.style.display = 'block';
            activeBet = null;
        }

        function setPopUI(t, c, e, d) {
            document.getElementById('popTitle').innerText = t;
            document.getElementById('popTitle').style.color = c;
            document.getElementById('popEmoji').innerText = e;
            document.getElementById('popDesc').innerText = d;
        }
    </script>
</body>
</html>
