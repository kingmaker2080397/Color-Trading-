<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Win Go 1Min - Maker Gold</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #1e3a8a; --bg: #070b14; --card: #1e293b; --gold: #fbbf24; --green: #22c55e; --red: #ef4444; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: white; text-align: center; }
        
        /* Header & Balance Section */
        .game-header { background: linear-gradient(180deg, #1e40af, var(--bg)); padding: 30px 20px; }
        .balance-card { background: rgba(255,255,255,0.05); margin: 0 20px; padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
        
        /* Timer Section */
        .timer-card { background: var(--card); margin: 20px; padding: 25px; border-radius: 30px; border-bottom: 4px solid var(--gold); position: relative; }
        .timer-val { font-size: 50px; color: var(--gold); font-weight: bold; font-family: 'Courier New', monospace; }
        .period-info { display: flex; justify-content: space-between; font-size: 13px; color: #94a3b8; margin-bottom: 10px; }

        /* Betting Buttons */
        .btn-container { display: flex; justify-content: center; gap: 15px; margin: 20px; }
        .bet-btn { flex: 1; padding: 18px; border-radius: 15px; border: none; color: white; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .btn-green { background: var(--green); box-shadow: 0 5px 0 #15803d; }
        .btn-red { background: var(--red); box-shadow: 0 5px 0 #991b1b; }
        .bet-btn:active { transform: translateY(3px); box-shadow: none; }

        /* Result Popup */
        #resPop { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; }
        .pop-card { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1e293b; width: 300px; padding: 30px; border-radius: 35px; border: 2px solid var(--gold); text-align: center; }
        .pop-btn { background: var(--gold); color: black; border: none; padding: 12px 40px; border-radius: 25px; font-weight: bold; margin-top: 20px; cursor: pointer; width: 100%; }

        /* Leaderboard */
        .leaderboard { background: var(--card); margin: 20px; padding: 15px; border-radius: 20px; text-align: left; }
        .l-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #0f172a; font-size: 13px; }
    </style>
</head>
<body>

    <div id="resPop">
        <div class="pop-card">
            <h1 id="popEmoji" style="font-size: 70px; margin: 0;">🎉</h1>
            <h2 id="popTitle" style="font-size: 28px; margin: 10px 0;">YOU WIN!</h2>
            <p id="popDesc" style="color: #94a3b8;">Profit added to your wallet.</p>
            <button class="pop-btn" onclick="document.getElementById('resPop').style.display='none'">OK</button>
        </div>
    </div>

    <div class="game-header">
        <h3 style="margin: 0 0 10px 0;">Win Go 1Min</h3>
        <div class="balance-card">
            <span style="font-size: 12px; color: #94a3b8;">Wallet Balance</span>
            <div style="font-size: 22px; font-weight: bold; color: var(--gold);" id="walletDisplay">$ 0.00</div>
        </div>
    </div>

    <div class="timer-card">
        <div class="period-info">
            <span>Period ID: <b id="periodID" style="color:var(--gold)">Loading...</b></span>
            <span>Timer</span>
        </div>
        <div id="timerDisplay" class="timer-val">00:00</div>
    </div>

    <div class="btn-container">
        <button class="bet-btn btn-green" onclick="placeTrade('Green')">JOIN GREEN</button>
        <button class="bet-btn btn-red" onclick="placeTrade('Red')">JOIN RED</button>
    </div>

    <div class="leaderboard">
        <h4 style="margin:0 0 10px 0; color:var(--gold)">🏆 Global Winners</h4>
        <div id="ticker"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, get, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCh-1xi3jkIj5hUsmbm3GFGfT_AlWmxYkk", 
            databaseURL: "https://maker-trading-official-default-rtdb.firebaseio.com/" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const phone = localStorage.getItem("userPhone");

        let currentBet = null;
        let lastCheckedPeriod = "";

        // 1. Load Real Wallet Balance
        onValue(ref(db, `users/${phone}/wallet`), (snap) => {
            const bal = snap.val() || 0;
            document.getElementById('walletDisplay').innerText = "$ " + parseFloat(bal).toFixed(2);
        });

        // 2. Fixed Timer Logic (No NaN)
        onValue(ref(db, 'game_state'), async (snap) => {
            const data = snap.val();
            if(!data) return;

            let time = parseInt(data.timer) || 0;
            document.getElementById('timerDisplay').innerText = `00:${time < 10 ? '0'+time : time}`;
            document.getElementById('periodID').innerText = data.activePeriod || "---";

            // Result Logic (Jab timer 2 par ho)
            if(time === 2 && currentBet !== null && data.activePeriod !== lastCheckedPeriod) {
                lastCheckedPeriod = data.activePeriod;
                const winColor = (data.forcedResult === "AUTO" || !data.forcedResult) ? data.lastResult : data.forcedResult;
                calculateResult(winColor);
            }
        });

        window.placeTrade = (color) => {
            currentBet = color;
            const toast = document.createElement("div");
            toast.innerText = "Trade Placed: " + color;
            toast.style = "position:fixed; bottom:50px; left:50%; transform:translateX(-50%); background:var(--green); padding:10px 30px; border-radius:20px; z-index:20000;";
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        };

        async function calculateResult(winColor) {
            const userRef = ref(db, `users/${phone}`);
            const snap = await get(userRef);
            let wallet = snap.val().wallet || 0;
            let stakeAmt = 10; // Default Trade Amount $10

            const pop = document.getElementById('resPop');
            const title = document.getElementById('popTitle');
            const emoji = document.getElementById('popEmoji');
            const desc = document.getElementById('popDesc');

            if(currentBet === winColor) {
                // WIN - Add 1.9x profit
                let profit = stakeAmt * 0.9; 
                await update(userRef, { wallet: wallet + profit });
                emoji.innerText = "🎉"; title.innerText = "YOU WIN!"; title.style.color = "#22c55e";
                desc.innerText = `Profit of $${profit.toFixed(2)} added to wallet.`;
            } else {
                // LOSS - Deduct Stake
                await update(userRef, { wallet: wallet - stakeAmt });
                emoji.innerText = "💔"; title.innerText = "SORRY, LOSS"; title.style.color = "#ef4444";
                desc.innerText = `Better luck next time. Lost $${stakeAmt}.`;
            }
            pop.style.display = 'block';
            currentBet = null;
        }

        // 3. Fake Winners List
        const flags = ['🇮🇳','🇵🇰','🇦🇺','🇬🇧','🇺🇸'];
        setInterval(() => {
            const f = flags[Math.floor(Math.random()*flags.length)];
            const amt = (Math.random()*100 + 5).toFixed(2);
            const row = document.createElement('div');
            row.className = 'l-row';
            row.innerHTML = `<span>${f} User***${Math.floor(Math.random()*999)}</span> <span style="color:var(--green);">+$${amt}</span>`;
            const ticker = document.getElementById('ticker');
            ticker.prepend(row);
            if(ticker.children.length > 4) ticker.lastChild.remove();
        }, 3000);

    </script>
</body>
</html>
