<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Win Go 1Min - Maker Gold</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #1e3a8a; --bg: #070b14; --card: #1e293b; --gold: #fbbf24; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: white; text-align: center; }
        .game-header { background: linear-gradient(180deg, #1e40af, var(--bg)); padding: 40px 20px; font-size: 28px; font-weight: bold; }
        .timer-card { background: var(--card); margin: 20px; padding: 25px; border-radius: 30px; border-bottom: 4px solid var(--gold); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .timer-val { font-size: 45px; color: var(--gold); font-weight: bold; margin-top: 10px; text-shadow: 0 0 15px rgba(251,191,36,0.4); }
        .period-id { color: #3b82f6; font-size: 18px; }
        .btn-container { display: flex; justify-content: center; gap: 20px; margin-top: 30px; }
        .join-btn { padding: 20px 40px; border-radius: 15px; border: none; color: white; font-weight: bold; font-size: 18px; cursor: pointer; box-shadow: 0 6px 0 rgba(0,0,0,0.3); transition: 0.2s; }
        .green { background: #22c55e; } .red { background: #ef4444; }
        .join-btn:active { transform: translateY(4px); box-shadow: none; }
    </style>
</head>
<body>

    <div class="game-header">Win Go 1Min</div>

    <div class="timer-card">
        <div style="display:flex; justify-content:space-between; font-size:14px; color:#94a3b8;">
            <span>Period ID</span>
            <span>Timer</span>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div id="periodID" class="period-id">20260420...</div>
            <div id="timerDisplay" class="timer-val">00:00</div>
        </div>
    </div>

    <div class="btn-container">
        <button class="join-btn green" onclick="joinGame('Green')">JOIN GREEN</button>
        <button class="join-btn red" onclick="joinGame('Red')">JOIN RED</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyCh-1xi3jkIj5hUsmbm3GFGfT_AlWmxYkk", databaseURL: "https://maker-trading-official-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Timer Sync Logic
        onValue(ref(db, 'game_state'), (snap) => {
            const data = snap.val() || { timer: 60, activePeriod: "Loading..." };
            const time = data.timer;
            const minutes = Math.floor(time / 60);
            const seconds = time % 60;
            
            document.getElementById('timerDisplay').innerText = 
                `0${minutes}:${seconds < 10 ? '0' + seconds : seconds}`;
            document.getElementById('periodID').innerText = data.activePeriod;
        });

        window.joinGame = (color) => {
            alert("Joined " + color + "! Waiting for result...");
        };
    </script>
</body>
</html>
