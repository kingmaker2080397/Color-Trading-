<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Win Go 1Min - Maker Gold</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #1e3a8a; --bg: #070b14; --card: #1e293b; --gold: #fbbf24; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: white; text-align: center; }
        .timer-card { background: var(--card); margin: 20px; padding: 25px; border-radius: 30px; border-bottom: 4px solid var(--gold); }
        .timer-val { font-size: 45px; color: var(--gold); font-weight: bold; }
        
        /* Popup Styling */
        #resultPop { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; }
        .pop-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1e293b; width: 280px; padding: 30px; border-radius: 30px; border: 2px solid var(--gold); text-align: center; }
        .win { color: #22c55e; } .loss { color: #ef4444; }
        .btn-close { background: var(--gold); border: none; padding: 10px 30px; border-radius: 20px; font-weight: bold; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="resultPop">
        <div class="pop-content">
            <h1 id="resIcon" style="font-size: 60px; margin:0;">🎉</h1>
            <h2 id="resTitle">YOU WIN!</h2>
            <p id="resMsg">Congratulations on your trade.</p>
            <button class="btn-close" onclick="closePop()">OK</button>
        </div>
    </div>

    <div class="game-header" style="padding:40px 0; font-size:24px; font-weight:bold;">Win Go 1Min</div>

    <div class="timer-card">
        <div style="display:flex; justify-content:space-between; font-size:12px; color:#94a3b8;">
            <span>Period ID</span> <span>Timer</span>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
            <div id="periodID" style="color:#3b82f6;">Loading...</div>
            <div id="timerDisplay" class="timer-val">00:00</div>
        </div>
    </div>

    <div style="display:flex; justify-content:center; gap:20px; margin-top:30px;">
        <button onclick="bet('Green')" style="background:#22c55e; color:white; padding:15px 30px; border-radius:15px; border:none; font-weight:bold;">JOIN GREEN</button>
        <button onclick="bet('Red')" style="background:#ef4444; color:white; padding:15px 30px; border-radius:15px; border:none; font-weight:bold;">JOIN RED</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, get, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyCh-1xi3jkIj5hUsmbm3GFGfT_AlWmxYkk", databaseURL: "https://maker-trading-official-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const phone = localStorage.getItem("userPhone");

        let myBet = null;

        // 1. Timer Logic with NaN Fix
        onValue(ref(db, 'game_state'), (snap) => {
            const data = snap.val();
            if(!data) return;

            // Fix: Ensure time is a number
            let time = parseInt(data.timer) || 0;
            let mins = Math.floor(time / 60);
            let secs = time % 60;
            
            document.getElementById('timerDisplay').innerText = 
                (mins < 10 ? "0"+mins : mins) + ":" + (secs < 10 ? "0"+secs : secs);
            document.getElementById('periodID').innerText = data.activePeriod || "Wait...";

            // 2. Result Logic (Timer jab 1 par pahuche)
            if(time === 1 && myBet !== null) {
                checkResult(data.forcedResult, data.lastResult);
            }
        });

        window.bet = (color) => {
            myBet = color;
            alert("Bet placed on " + color);
        };

        async function checkResult(forced, last) {
            const finalResult = (forced === "AUTO" || !forced) ? last : forced;
            const pop = document.getElementById('resultPop');
            
            if(myBet === finalResult) {
                // WIN
                document.getElementById('resTitle').innerText = "YOU WIN!";
                document.getElementById('resTitle').className = "win";
                document.getElementById('resIcon').innerText = "🎉";
                document.getElementById('resMsg').innerText = "Winning Color: " + finalResult;
            } else {
                // LOSS
                document.getElementById('resTitle').innerText = "YOU LOSE";
                document.getElementById('resTitle').className = "loss";
                document.getElementById('resIcon').innerText = "💔";
                document.getElementById('resMsg').innerText = "Winning Color was: " + finalResult;
            }
            pop.style.display = 'block';
            myBet = null; // Reset bet
        }

        window.closePop = () => document.getElementById('resultPop').style.display = 'none';

    </script>
</body>
</html>
