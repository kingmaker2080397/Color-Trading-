<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maker Gold - Live Trade Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --blue: #1e40af; --bg: #030712; --card: #111827; 
            --gold: #fbbf24; --green: #10b981; --red: #f43f5e; 
            --glass: rgba(255, 255, 255, 0.03);
        }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: #f3f4f6; overflow-x: hidden; padding-bottom: 50px; }
        .game-header { background: linear-gradient(180deg, #1e3a8a 0%, var(--bg) 100%); padding: 30px 20px; border-bottom: 1px solid var(--glass); }
        .balance-card { background: var(--glass); backdrop-filter: blur(10px); margin: 0 auto; max-width: 400px; padding: 20px; border-radius: 20px; border: 1px solid rgba(251, 191, 36, 0.3); text-align: center; }
        
        /* Asset Selector */
        .asset-scroll { display: flex; gap: 10px; overflow-x: auto; padding: 15px 20px; scrollbar-width: none; }
        .asset-card { min-width: 100px; background: var(--card); padding: 10px; border-radius: 12px; border: 1px solid #1f2937; text-align: center; cursor: pointer; }
        .asset-card.active { border-color: var(--gold); background: rgba(251, 191, 36, 0.1); }

        .timer-card { background: var(--card); margin: 10px 20px; padding: 20px; border-radius: 20px; border: 1px solid var(--glass); display: flex; justify-content: space-between; align-items: center; }
        .timer-val { font-size: 35px; color: var(--gold); font-weight: 700; font-variant-numeric: tabular-nums; }
        
        .bet-container { padding: 0 20px; max-width: 500px; margin: 0 auto; }
        .input-wrapper { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid #1f2937; margin-bottom: 15px; }
        input[type="number"] { width: 90%; background: #030712; border: 1px solid #374151; padding: 12px; border-radius: 10px; color: var(--gold); font-size: 18px; text-align: center; outline: none; }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .bet-btn { padding: 15px; border-radius: 12px; border: none; color: white; font-weight: 600; font-size: 16px; cursor: pointer; }
        .btn-up { background: var(--green); box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2); }
        .btn-down { background: var(--red); box-shadow: 0 4px 12px rgba(244, 63, 94, 0.2); }
        
        #resPop { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; backdrop-filter: blur(10px); }
        .pop-card { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1f2937; width: 80%; padding: 30px; border-radius: 25px; text-align: center; border: 1px solid var(--gold); }
    </style>
</head>
<body>

    <div id="resPop">
        <div class="pop-card">
            <div id="popEmoji" style="font-size: 50px;">🎉</div>
            <h2 id="popTitle">RESULT</h2>
            <p id="popDesc"></p>
            <button onclick="closePopup()" style="width:100%; background:var(--gold); padding:12px; border-radius:10px; border:none; font-weight:bold;">CLOSE</button>
        </div>
    </div>

    <div class="game-header">
        <div class="balance-card">
            <div style="font-size: 10px; color: #94a3b8; letter-spacing: 1px;">LIVE WALLET</div>
            <div style="font-size: 28px; font-weight: 700; color: var(--gold);" id="walletDisp">₹ 0.00</div>
        </div>
    </div>

    <div class="asset-scroll" id="assetList">
        <div class="asset-card active" onclick="selectAsset('BTC')"><b>BTC</b><br><small id="price-BTC">...</small></div>
        <div class="asset-card" onclick="selectAsset('ETH')"><b>ETH</b><br><small id="price-ETH">...</small></div>
        <div class="asset-card" onclick="selectAsset('SOL')"><b>SOL</b><br><small id="price-SOL">...</small></div>
        <div class="asset-card" onclick="selectAsset('TRX')"><b>TRX</b><br><small id="price-TRX">...</small></div>
    </div>

    <div class="timer-card">
        <div>
            <div style="font-size:10px; color:#6b7280;">PERIOD ID</div>
            <div id="periodID" style="color:var(--gold); font-weight:bold;">202405...</div>
        </div>
        <div class="timer-val" id="timerDisplay">05:00</div>
    </div>

    <div class="bet-container">
        <div class="input-wrapper">
            <div style="font-size: 11px; color: #6b7280; margin-bottom: 8px;">ENTER AMOUNT (INR)</div>
            <input type="number" id="betAmountInput" value="100" min="10">
        </div>

        <div style="display: flex; justify-content: space-around; margin-bottom: 15px; font-size: 12px;">
            <span onclick="setAmt(100)" style="background:#1f2937; padding:5px 15px; border-radius:5px;">+100</span>
            <span onclick="setAmt(500)" style="background:#1f2937; padding:5px 15px; border-radius:5px;">+500</span>
            <span onclick="setAmt(1000)" style="background:#1f2937; padding:5px 15px; border-radius:5px;">+1000</span>
        </div>

        <div class="btn-grid">
            <button class="bet-btn btn-up" onclick="placeTrade('High')">📈 CALL (UP)</button>
            <button class="bet-btn btn-down" onclick="placeTrade('Low')">📉 PUT (DOWN)</button>
        </div>
        
        <p style="text-align: center; font-size: 10px; color: #4b5563;">Trades settle every 5 minutes based on live market price.</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, get, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCh-1xi3jkIj5hUsmbm3GFGfT_AlWmxYkk", 
            databaseURL: "https://maker-trading-official-default-rtdb.firebaseio.com/" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const phone = localStorage.getItem("userPhone") || "0000000000";

        let currentAsset = "BTC";
        
        // 1. Live Price Sync (Binance)
        async function updateMarketPrices() {
            const assets = ['BTCUSDT', 'ETHUSDT', 'SOLUSDT', 'TRXUSDT'];
            try {
                const response = await fetch('https://api.binance.com/api/v3/ticker/price');
                const data = await response.json();
                data.forEach(item => {
                    let symbol = item.symbol.replace('USDT', '');
                    if(assets.includes(item.symbol)) {
                        let el = document.getElementById(`price-${symbol}`);
                        if(el) el.innerText = "$" + parseFloat(item.price).toFixed(2);
                    }
                });
            } catch (e) { console.log("Price error"); }
        }
        setInterval(updateMarketPrices, 3000);

        // 2. Wallet Sync
        onValue(ref(db, `users/${phone}/wallet`), (snap) => {
            document.getElementById('walletDisp').innerText = "₹ " + parseFloat(snap.val() || 0).toFixed(2);
        });

        // 3. 5-Min Timer Logic
        function startTimer() {
            setInterval(() => {
                let now = new Date();
                let mins = 4 - (now.getMinutes() % 5);
                let secs = 59 - now.getSeconds();
                document.getElementById('timerDisplay').innerText = 
                    `${mins < 10 ? '0'+mins : mins}:${secs < 10 ? '0'+secs : secs}`;
                
                // Period ID based on time
                let pId = now.getFullYear().toString() + (now.getMonth()+1) + now.getDate() + now.getHours() + Math.floor(now.getMinutes()/5);
                document.getElementById('periodID').innerText = pId;
            }, 1000);
        }
        startTimer();

        window.setAmt = (a) => { document.getElementById('betAmountInput').value = a; };
        window.selectAsset = (a) => {
            currentAsset = a;
            document.querySelectorAll('.asset-card').forEach(c => c.classList.remove('active'));
            event.currentTarget.classList.add('active');
        };

        // Trade Place Logic (Connecting to your existing Firebase)
        window.placeTrade = async (type) => {
            let amt = parseFloat(document.getElementById('betAmountInput').value);
            const userRef = ref(db, `users/${phone}`);
            const snap = await get(userRef);
            
            if(snap.exists() && snap.val().wallet >= amt) {
                let newBal = snap.val().wallet - amt;
                await update(userRef, { wallet: newBal });
                alert(`Trade Placed on ${currentAsset} (${type}) for ₹${amt}`);
                // Yahan aap apna database entry logic add kar sakte hain
            } else {
                alert("Insufficient Balance!");
            }
        };
    </script>
</body>
            </html>
