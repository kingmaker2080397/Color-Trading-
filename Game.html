<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Win Go - Maker Gold</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1e3a8a; --gold: #fbbf24; --bg: #070b14; --card: #1e293b; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: white; text-align: center; }
        .game-header { background: var(--card); padding: 20px; border-bottom: 2px solid var(--gold); }
        .wallet-box { font-size: 20px; color: var(--gold); font-weight: bold; }
        .timer-card { background: linear-gradient(135deg, #1e3a8a, #0f172a); margin: 15px; padding: 20px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; }
        .time-left { font-size: 32px; font-weight: bold; }
        .bet-section { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-bet { padding: 15px; border: none; border-radius: 12px; font-weight: bold; color: white; cursor: pointer; }
        .big { background: var(--gold); color: #000; }
        .small { background: #3b82f6; }
        .modal { display: none; position: fixed; bottom: 0; width: 100%; background: #1e293b; padding: 20px; border-radius: 20px 20px 0 0; z-index: 100; border-top: 2px solid var(--gold); box-sizing: border-box; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #070b14; border: 1px solid var(--gold); color: white; border-radius: 8px; }
        table { width: 90%; margin: 20px auto; border-collapse: collapse; font-size: 12px; }
        th, td { padding: 10px; border-bottom: 1px solid #334155; }
    </style>
</head>
<body>

    <div class="game-header">
        <div style="font-size: 12px; color: #94a3b8;">USDT BALANCE</div>
        <div class="wallet-box" id="uWallet">0.00</div>
    </div>

    <div class="timer-card">
        <div><div id="periodId" style="font-size: 14px; color: var(--gold);">20240421001</div></div>
        <div class="time-left" id="timer">00:60</div>
    </div>

    <div class="bet-section">
        <button class="btn-bet big" onclick="openModal('Big')">BIG</button>
        <button class="btn-bet small" onclick="openModal('Small')">SMALL</button>
    </div>

    <div id="betModal" class="modal">
        <h3 id="selChoice">Choice: Big</h3>
        <input type="number" id="betAmount" placeholder="Amount (USDT)">
        <button class="btn-bet" style="background:var(--gold); color:black; width:100%;" onclick="confirmBet()">CONFIRM TRADE</button>
        <button onclick="closeModal()" style="background:none; color:grey; border:none; margin-top:10px;">Cancel</button>
    </div>

    <table>
        <thead><tr><th>Period</th><th>Number</th><th>Size</th></tr></thead>
        <tbody id="historyBody"></tbody>
    </table>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, set, update, push, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyCh-1xi3jkIj5hUsmbm3GFGfT_AlWmxYkk", databaseURL: "https://maker-trading-official-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const phone = localStorage.getItem("userPhone");

        let currentWallet = 0;
        let selectedBet = "";
        let timeLeft = 60;

        onValue(ref(db, 'users/' + phone), (snap) => {
            if(snap.exists()) {
                currentWallet = snap.val().wallet || 0;
                document.getElementById('uWallet').innerText = currentWallet.toFixed(2);
            }
        });

        setInterval(() => {
            if(timeLeft > 0) {
                timeLeft--;
                document.getElementById('timer').innerText = "00:" + (timeLeft < 10 ? "0" + timeLeft : timeLeft);
            } else {
                timeLeft = 60;
                processResult();
            }
        }, 1000);

        async function processResult() {
            const fixSnap = await get(ref(db, 'game_control/next_fix'));
            let num, size;
            if(fixSnap.exists()){
                const fix = fixSnap.val();
                if(fix === "Small") num = 2; else if(fix === "Big") num = 7;
                else num = parseInt(fix.split(" ")[1]);
                set(ref(db, 'game_control/next_fix'), null);
            } else {
                num = Math.floor(Math.random() * 10);
            }
            size = num >= 5 ? "Big" : "Small";
            push(ref(db, 'game_history'), { period: Date.now(), number: num, size: size });
            checkWin(num, size);
        }

        window.openModal = (c) => { selectedBet = c; document.getElementById('selChoice').innerText = "Choice: "+c; document.getElementById('betModal').style.display="block"; };
        window.closeModal = () => { document.getElementById('betModal').style.display="none"; };

        window.confirmBet = async () => {
            const amt = parseFloat(document.getElementById('betAmount').value);
            const uSnap = await get(ref(db, 'users/' + phone));
            if(uSnap.val().kycStatus !== "Approved") return alert("KYC NOT APPROVED!");
            if(amt > currentWallet) return alert("Low Balance!");

            await update(ref(db, 'users/' + phone), { wallet: currentWallet - amt });
            localStorage.setItem("activeBet", JSON.stringify({choice: selectedBet, amount: amt}));
            alert("Trade Placed!");
            closeModal();
        };

        function checkWin(n, s) {
            const bet = JSON.parse(localStorage.getItem("activeBet"));
            if(!bet) return;
            if(bet.choice === s || bet.choice == n) {
                update(ref(db, 'users/' + phone), { wallet: currentWallet + (bet.amount * 1.9) });
                alert("YOU WON!");
            }
            localStorage.removeItem("activeBet");
        }
    </script>
</body>
</html>
