<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Maker Trading Gold</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #fbbf24; --bg: #070b14; --card: #1e293b; }
        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--bg); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            color: white;
            background: radial-gradient(circle at top, #1e3a8a 0%, var(--bg) 100%);
        }
        .card { 
            background: var(--card); 
            padding: 40px 30px; 
            border-radius: 25px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); 
            width: 340px; 
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
            border-bottom: 4px solid var(--gold);
        }
        .logo-text { font-size: 28px; font-weight: 700; color: var(--gold); letter-spacing: 1px; margin-bottom: 5px; }
        .sub-text { color: #94a3b8; font-size: 12px; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 1px; }
        
        input { 
            width: 100%; 
            padding: 15px; 
            margin: 12px 0; 
            border: 1px solid #334155; 
            border-radius: 15px; 
            box-sizing: border-box; 
            background: #0f172a; 
            color: white;
            outline: none;
            transition: 0.3s;
            font-size: 15px;
        }
        input:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(251, 191, 36, 0.2); }
        
        button { 
            width: 100%; 
            padding: 16px; 
            background: var(--gold); 
            color: #070b14; 
            border: none; 
            border-radius: 15px; 
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 20px;
            font-size: 16px;
            transition: 0.3s;
            text-transform: uppercase;
        }
        button:active { transform: scale(0.98); }
        button:disabled { background: #475569; cursor: not-allowed; opacity: 0.7; }
        
        .footer-links { margin-top: 25px; font-size: 14px; color: #94a3b8; }
        .footer-links a { color: var(--gold); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-text">MAKER GOLD</div>
        <div class="sub-text">Professional Trading Portal</div>
        
        <input type="tel" id="loginPhone" placeholder="Mobile Number" maxlength="10">
        <input type="password" id="loginPass" placeholder="Password">
        
        <button id="loginBtn">LOGIN NOW</button>
        
        <div class="footer-links">
            Don't have an account? <br>
            <a href="register.html">Create New Account</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCh-1xi3jkIj5hUsmbm3GFGfT_AlWmxYkk",
            databaseURL: "https://maker-trading-official-default-rtdb.firebaseio.com/"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 1. Auto-Login Check (User session barkrar rakhta hai)
        if (localStorage.getItem("userPhone")) {
            window.location.href = "home.html";
        }

        const loginBtn = document.getElementById('loginBtn');

        loginBtn.onclick = async function() {
            const phone = document.getElementById('loginPhone').value.trim();
            const pass = document.getElementById('loginPass').value.trim();

            if (phone.length < 10) {
                alert("Please enter a valid 10-digit mobile number.");
                return;
            }
            if (pass === "") {
                alert("Please enter your password.");
                return;
            }

            loginBtn.disabled = true;
            loginBtn.innerText = "Verifying Account...";

            try {
                const userRef = ref(db, 'users/' + phone);
                const snapshot = await get(userRef);

                if (snapshot.exists()) {
                    const userData = snapshot.val();
                    
                    if (userData.password === pass) {
                        // Success: Save Session in LocalStorage
                        localStorage.setItem("userPhone", phone);
                        localStorage.setItem("userName", userData.name || "User");
                        
                        alert("Login Successful! Welcome to Maker Gold.");
                        window.location.href = "home.html";
                    } else {
                        alert("Incorrect Password! Please try again.");
                        resetBtn();
                    }
                } else {
                    alert("No account found with this number. Please Register first.");
                    resetBtn();
                }
            } catch (error) {
                console.error(error);
                alert("Server connection failed. Check your internet.");
                resetBtn();
            }
        };

        function resetBtn() {
            loginBtn.disabled = false;
            loginBtn.innerText = "LOGIN NOW";
        }
    </script>
</body>
</html>
