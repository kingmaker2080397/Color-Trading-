<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Maker Gold</title>
    <style>
        :root { --primary: #3b82f6; --bg: #070b14; --card: #1e293b; --gold: #fbbf24; }
        body { 
            margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); color: white; display: flex; 
            align-items: center; justify-content: center; height: 100vh; 
            background: radial-gradient(circle at top, #1e3a8a 0%, var(--bg) 100%);
        }
        .card { 
            background: var(--card); padding: 40px 30px; border-radius: 30px; 
            width: 85%; max-width: 350px; text-align: center; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.05);
        }
        .logo { font-size: 30px; font-weight: bold; color: var(--gold); margin-bottom: 5px; }
        .sub-text { color: #94a3b8; font-size: 12px; margin-bottom: 30px; letter-spacing: 1px; }
        
        input { 
            width: 100%; padding: 16px; margin: 12px 0; border-radius: 15px; 
            border: 1px solid #334155; background: #0f172a; color: white; 
            box-sizing: border-box; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(251, 191, 36, 0.2); }
        
        .btn { 
            width: 100%; padding: 16px; background: var(--gold); color: #000; 
            border: none; border-radius: 15px; font-weight: bold; font-size: 16px;
            cursor: pointer; margin-top: 15px; transition: 0.3s;
        }
        .btn:active { transform: scale(0.98); }
        
        .extra-links { margin-top: 25px; font-size: 13px; color: #94a3b8; }
        .extra-links a { color: var(--gold); text-decoration: none; font-weight: bold; }

        /* Enhanced Popup */
        #popup { 
            display: none; position: fixed; top: 20px; left: 50%; 
            transform: translateX(-50%); background: #1e293b; padding: 15px 30px; 
            border-radius: 50px; border: 1px solid var(--gold); z-index: 1000; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; 
            animation: slideDown 0.4s ease-out;
        }
        @keyframes slideDown { from { top: -50px; } to { top: 20px; } }
    </style>
</head>
<body>

    <div id="popup">
        <span id="popIcon" style="margin-right: 10px;"></span>
        <span id="popMsg"></span>
    </div>

    <div class="card">
        <div class="logo">MAKER GOLD</div>
        <div class="sub-text">SECURE LOGIN PORTAL</div>
        
        <input type="tel" id="phone" placeholder="Phone Number" maxlength="10">
        <input type="password" id="pass" placeholder="Password">
        
        <button class="btn" onclick="handleLogin()">LOGIN NOW</button>
        
        <div class="extra-links">
            Don't have an account? <a href="register.html">Sign Up</a><br><br>
            <a href="forgot.html" style="font-size: 11px; font-weight: normal; opacity: 0.7;">Forgot Password?</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCh-1xi3jkIj5hUsmbm3GFGfT_AlWmxYkk",
            databaseURL: "https://maker-trading-official-default-rtdb.firebaseio.com/" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Check if already logged in
        window.onload = () => {
            if(localStorage.getItem("userPhone")) {
                location.href = "home.html";
            }
        };

        window.showPop = (msg, type) => {
            const p = document.getElementById('popup');
            document.getElementById('popMsg').innerText = msg;
            document.getElementById('popIcon').innerText = type === 'success' ? '✅' : '❌';
            p.style.display = 'block';
            setTimeout(() => { p.style.display = 'none'; }, 2500);
        };

        window.handleLogin = async () => {
            const phone = document.getElementById('phone').value.trim();
            const pass = document.getElementById('pass').value.trim();

            if(!phone || !pass) { 
                showPop("Please enter details", "error"); 
                return; 
            }

            // Loading state
            const loginBtn = document.querySelector('.btn');
            loginBtn.innerText = "VERIFYING...";
            loginBtn.disabled = true;

            try {
                const userRef = ref(db, 'users/' + phone);
                const snap = await get(userRef);

                if(snap.exists() && snap.val().password === pass) {
                    showPop("Welcome back!", "success");
                    localStorage.setItem("userPhone", phone);
                    setTimeout(() => { location.href = "home.html"; }, 1500);
                } else {
                    showPop("Invalid Phone or Password", "error");
                    loginBtn.innerText = "LOGIN NOW";
                    loginBtn.disabled = false;
                }
            } catch (err) {
                showPop("Server Error", "error");
                loginBtn.innerText = "LOGIN NOW";
                loginBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
