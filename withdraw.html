<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdrawal</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #fff1f2; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: #ef4444; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Withdrawal Request</h3>
        <p>Available: <span id="balDisplay">₹ 0.00</span></p>
        <input type="number" id="wAmt" placeholder="Enter Amount">
        <input type="text" id="wMethod" placeholder="EasyPaisa/JazzCash Number">
        <input type="text" id="wName" placeholder="Account Title Name">
        <button class="btn" id="wBtn">Withdraw Now</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCh-1xi3jkIj5hUsmbm3GFGfT_AlWmxYkk",
            authDomain: "maker-trading-official.firebaseapp.com",
            databaseURL: "https://maker-trading-official-default-rtdb.firebaseio.com/",
            projectId: "maker-trading-official",
            appId: "1:262205995192:web:d7255379855a0fc9489c4d"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const phone = localStorage.getItem("userPhone");

        onValue(ref(db, 'users/' + phone), (snapshot) => {
            const currentBal = snapshot.val().balance;
            document.getElementById('balDisplay').innerText = "₹ " + currentBal.toFixed(2);
            
            document.getElementById('wBtn').onclick = function() {
                const amt = document.getElementById('wAmt').value;
                if(amt > currentBal || amt < 200) { alert("Insufficient balance or min ₹200!"); return; }

                set(ref(db, 'withdrawRequests/' + phone + "_" + Date.now()), {
                    user: phone,
                    amount: amt,
                    details: document.getElementById('wMethod').value + " (" + document.getElementById('wName').value + ")",
                    status: "Pending"
                }).then(() => { alert("Withdrawal request sent!"); window.location.href="profile.html"; });
            };
        });
    </script>
</body>
</html>
