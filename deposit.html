<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit - Maker Gold</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3b82f6; --bg: #070b14; --card: #1e293b; --gold: #fbbf24; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: white; padding: 20px; text-align: center; }
        
        .method-card { 
            background: var(--card); padding: 15px; border-radius: 20px; border: 1px solid #334155; 
            margin-bottom: 15px; cursor: pointer; display: flex; align-items: center; justify-content: space-between;
            transition: 0.3s;
        }
        .method-card.active { border-color: var(--primary); background: rgba(59, 130, 246, 0.1); }
        .method-card.disabled { opacity: 0.5; cursor: not-allowed; }
        
        .details-box { 
            display: none; background: #0f172a; padding: 20px; border-radius: 20px; 
            border: 1px dashed var(--gold); margin: 20px 0; 
        }
        
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 18px; background: linear-gradient(135deg, #22c55e, #16a34a); color: white; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 0 #15803d; margin-top: 15px; }
        .btn:active { transform: translateY(3px); box-shadow: none; }

        #gamePop { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; }
        .pop-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1e293b; width: 280px; padding: 30px; border-radius: 30px; border: 2px solid var(--gold); text-align: center; }
        
        .status-badge { font-size: 10px; padding: 4px 8px; border-radius: 5px; background: #ef4444; color: white; }
        .online-badge { background: #22c55e; }
    </style>
</head>
<body>

    <div id="gamePop">
        <div class="pop-content">
            <h1 style="font-size: 60px; margin:0;">✅</h1>
            <h2 id="popTitle" style="color: #22c55e;">SUBMITTED</h2>
            <p id="popMsg">Your deposit is under verification.</p>
            <button onclick="location.href='home.html'" style="background:#22c55e; border:none; padding:10px 40px; border-radius:20px; color:white; font-weight:bold; cursor:pointer; margin-top:15px;">OK</button>
        </div>
    </div>

    <h2>Select Payment Method</h2>
    <p style="color:#94a3b8; font-size:12px; margin-bottom:20px;">Choose a method to see payment details</p>

    <div id="ep_card" class="method-card" onclick="selectMethod('ep')">
        <div style="display:flex; align-items:center;">
            <div style="font-size:25px; margin-right:15px;">📱</div>
            <div style="text-align:left;"><b>Easypaisa</b><br><small id="ep_status">Checking...</small></div>
        </div>
    </div>

    <div id="jc_card" class="method-card" onclick="selectMethod('jc')">
        <div style="display:flex; align-items:center;">
            <div style="font-size:25px; margin-right:15px;">📲</div>
            <div style="text-align:left;"><b>JazzCash</b><br><small id="jc_status">Checking...</small></div>
        </div>
    </div>

    <div id="usdt_card" class="method-card" onclick="selectMethod('usdt')">
        <div style="display:flex; align-items:center;">
            <div style="font-size:25px; margin-right:15px;">💎</div>
            <div style="text-align:left;"><b>USDT (TRC20)</b><br><small id="usdt_status">Checking...</small></div>
        </div>
    </div>

    <div id="detailsArea" class="details-box">
        <p style="font-size:12px; color:#94a3b8; margin:0;">Pay to this account/address:</p>
        <h3 id="paymentDetail" style="color:var(--gold); margin:15px 0; word-break:break-all;">---</h3>
        <button onclick="copyDetail()" style="background:none; border:none; color:var(--primary); font-weight:bold; cursor:pointer;">COPY DETAIL</button>
    </div>

    <div id="formArea" style="display:none;">
        <input type="number" id="depAmt" placeholder="Enter Amount (₹)">
        <input type="text" id="depTID" placeholder="Transaction ID / TRX ID">
        <button class="btn" onclick="submitDeposit()">SUBMIT DEPOSIT</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyCh-1xi3jkIj5hUsmbm3GFGfT_AlWmxYkk", databaseURL: "https://maker-trading-official-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const phone = localStorage.getItem("userPhone");

        let paymentData = {};
        let selectedType = "";

        // Get Live Payment Data from Admin
        onValue(ref(db, 'admin_settings/payments'), (snap) => {
            paymentData = snap.val() || {};
            updateMethodUI('ep', paymentData.easypaisa);
            updateMethodUI('jc', paymentData.jazzcash);
            updateMethodUI('usdt', paymentData.usdt);
        });

        function updateMethodUI(type, value) {
            const card = document.getElementById(type + '_card');
            const status = document.getElementById(type + '_status');
            if(!value || value === "Coming Soon") {
                status.innerHTML = '<span class="status-badge">Coming Soon</span>';
                card.classList.add('disabled');
            } else {
                status.innerHTML = '<span class="status-badge online-badge">Online</span>';
                card.classList.remove('disabled');
            }
        }

        window.selectMethod = (type) => {
            const val = paymentData[type === 'ep' ? 'easypaisa' : type === 'jc' ? 'jazzcash' : 'usdt'];
            if(!val || val === "Coming Soon") return;

            selectedType = type;
            document.querySelectorAll('.method-card').forEach(c => c.classList.remove('active'));
            document.getElementById(type + '_card').classList.add('active');
            
            document.getElementById('detailsArea').style.display = 'block';
            document.getElementById('formArea').style.display = 'block';
            document.getElementById('paymentDetail').innerText = val;
        };

        window.copyDetail = () => {
            navigator.clipboard.writeText(document.getElementById('paymentDetail').innerText);
            alert("Payment Detail Copied!");
        };

        window.submitDeposit = () => {
            const amt = document.getElementById('depAmt').value;
            const tid = document.getElementById('depTID').value;

            if(!amt || !tid) return alert("Please fill all details!");

            const newDep = push(ref(db, 'deposits'));
            set(newDep, {
                user: phone,
                amount: parseFloat(amt),
                tid: tid,
                method: selectedType,
                status: "Pending",
                time: Date.now()
            }).then(() => {
                document.getElementById('gamePop').style.display = 'block';
            });
        };
    </script>
</body>
</html>
