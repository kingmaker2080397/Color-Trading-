<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maker Gold - Home</title>
    <style>
        :root { --primary: #3b82f6; --bg: #070b14; --card: #1e293b; --gold: #fbbf24; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: white; }
        .ticker { background: rgba(34,197,94,0.1); color: #22c55e; padding: 10px; font-size: 12px; font-weight: bold; border-bottom: 1px solid #22c55e; overflow: hidden; white-space: nowrap; }
        .header { padding: 40px 20px; text-align: center; background: linear-gradient(180deg, #1e40af, var(--bg)); }
        .bal-card { background: var(--card); width: 85%; margin: -40px auto 20px; padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; border-bottom: 3px solid var(--gold); }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .menu-item { background: var(--card); padding: 20px; border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .footer { position: fixed; bottom: 0; width: 100%; background: #0f172a; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #1e293b; }
        .nav-link { color: #94a3b8; text-decoration: none; font-size: 11px; text-align: center; }
    </style>
</head>
<body>

    <div class="ticker"><marquee id="tickerText">⚡ Loading withdrawals...</marquee></div>

    <div class="header">
        <h1>MAKER GOLD</h1>
        <p style="color: #94a3b8; font-size: 11px;">PROFESSIONAL TRADING PLATFORM</p>
    </div>

    <div class="bal-card">
        <small style="color: #94a3b8;">TOTAL BALANCE</small>
        <h2 id="uBal" style="color: var(--gold); margin: 10px 0; font-size: 30px;">₹ 0.00</h2>
        <button onclick="location.href='deposit.html'" style="background: var(--gold); border: none; padding: 8px 25px; border-radius: 20px; font-weight: bold;">RECHARGE</button>
    </div>

    <div class="menu-grid">
        <div class="menu-item" onclick="location.href='Game.html'">🎮<br><b>Win Go</b></div>
        <div class="menu-item" onclick="location.href='investment.html'">📈<br><b>Staking</b></div>
        <div class="menu-item" onclick="location.href='promotion.html'">🎁<br><b>Invite</b></div>
        <div class="menu-item" onclick="location.href='support.html'">🎧<br><b>Support</b></div>
    </div>

    <div class="footer">
        <a href="home.html" style="color:var(--gold);" class="nav-link">🏠<br>Home</a>
        <a href="Game.html" class="nav-link">🎮<br>Win Go</a>
        <a href="promotion.html" class="nav-link">🎁<br>Invite</a>
        <a href="profile.html" class="nav-link">👤<br>Mine</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyCh-1xi3jkIj5hUsmbm3GFGfT_AlWmxYkk", databaseURL: "https://maker-trading-official-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const phone = localStorage.getItem("userPhone");

        onValue(ref(db, 'users/' + phone), (snap) => {
            if(snap.exists()) document.getElementById('uBal').innerText = "₹ " + snap.val().wallet.toFixed(2);
        });

        // Fake Payouts
        const names = ["Zeeshan", "Ahmed", "Priya", "Rahul", "Saniya"];
        let txt = "";
        for(let i=0; i<10; i++) txt += `⚡ User ${names[Math.floor(Math.random()*5)]}*** withdrew ₹${(Math.random()*5000).toFixed(0)} | `;
        document.getElementById('tickerText').innerText = txt;
    </script>
</body>
            </html>
