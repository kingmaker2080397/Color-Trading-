<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maker Trading - VIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1e3a8a;
            --gold: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            background: #0f172a; /* Dark Blue Theme */
            font-family: 'Poppins', sans-serif;
            color: white;
            padding-bottom: 80px;
            overflow-x: hidden;
        }

        /* 3D Header */
        .header {
            background: var(--primary);
            padding: 20px;
            text-align: center;
            font-weight: 700;
            font-size: 22px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            border-bottom: 2px solid #3b82f6;
            letter-spacing: 1px;
        }

        /* Luxury Balance Card */
        .balance-card {
            background: linear-gradient(135deg, #1e293b, #334155);
            margin: 20px;
            padding: 30px;
            border-radius: 25px;
            text-align: center;
            position: relative;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            overflow: hidden;
        }

        .balance-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(59,130,246,0.1) 0%, transparent 70%);
        }

        .balance-amount {
            font-size: 36px;
            font-weight: 700;
            background: var(--gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 10px 0;
        }

        /* 3D Game Buttons */
        .game-section {
            background: var(--glass);
            backdrop-filter: blur(10px);
            margin: 15px;
            padding: 25px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .timer-3d {
            font-size: 45px;
            font-weight: 800;
            color: #ef4444;
            text-shadow: 0 0 20px rgba(239, 68, 68, 0.5);
            margin-bottom: 15px;
        }

        .btn-container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .btn-3d {
            border: none;
            padding: 20px 10px;
            border-radius: 15px;
            font-weight: 700;
            font-size: 14px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
            box-shadow: 0 8px 0 rgba(0,0,0,0.2);
        }

        .btn-3d:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
        }

        .btn-green { background: linear-gradient(180deg, #22c55e, #16a34a); box-shadow: 0 6px 0 #15803d; }
        .btn-violet { background: linear-gradient(180deg, #a855f7, #9333ea); box-shadow: 0 6px 0 #7e22ce; }
        .btn-red { background: linear-gradient(180deg, #ef4444, #dc2626); box-shadow: 0 6px 0 #b91c1c; }

        /* Floating Withdrawal/Deposit Buttons */
        .action-btns {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .action-btn {
            background: var(--gold);
            color: #1e3a8a;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: 700;
            border: none;
            box-shadow: 0 4px 15px rgba(191,149,63,0.4);
        }

        /* Fake Winnings Ticker */
        .ticker {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            margin-top: 20px;
            border-radius: 10px;
            font-size: 12px;
            color: #94a3b8;
        }

        /* Bottom Nav UI */
        .nav-ui {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #1e293b;
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 2px solid #334155;
            box-shadow: 0 -10px 25px rgba(0,0,0,0.3);
        }

        .nav-ui a {
            text-decoration: none;
            color: #94a3b8;
            font-size: 11px;
            text-align: center;
        }

        .nav-ui a.active {
            color: #3b82f6;
        }
    </style>
</head>
<body>

    <div class="header">MAKER TRADING GOLD</div>

    <div class="balance-card">
        <div style="font-size: 14px; color: #94a3b8;">VIP WALLET</div>
        <div class="balance-amount" id="userBalance">₹ 0.00</div>
        <div class="action-btns">
            <button class="action-btn" onclick="location.href='recharge.html'">DEPOSIT</button>
            <button class="action-btn" style="background: white;" onclick="location.href='withdraw.html'">WITHDRAW</button>
        </div>
    </div>

    <div class="game-section">
        <div style="display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 13px; color: #64748b;">
            <span>Period ID: <b id="periodId" style="color:white;">20260415</b></span>
            <span>🔥 Win Speed</span>
        </div>
        <center>
            <div class="timer-3d" id="timer">03:00</div>
        </center>
        <div class="btn-container">
            <button class="btn-3d btn-green" onclick="openBetModal('Green')">GREEN</button>
            <button class="btn-3d btn-violet" onclick="openBetModal('Violet')">VIOLET</button>
            <button class="btn-3d btn-red" onclick="openBetModal('Red')">RED</button>
        </div>
    </div>

    <div class="ticker">
        <marquee>🏆 User 923*** won ₹4,500 on Green | 🏆 User 917*** won ₹12,000 on Red | 🏆 923*** Withdraw ₹50,000 via JazzCash</marquee>
    </div>

    <div class="nav-ui">
        <a href="home.html" class="active">🏠<br>Home</a>
        <a href="records.html">📊<br>Activity</a>
        <a href="promotion.html">💎<br>Promote</a>
        <a href="profile.html">👤<br>Account</a>
    </div>

    </body>
    </html>
