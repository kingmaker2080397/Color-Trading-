<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAKER GOLD - Professional Trading</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1e3a8a; --gold: #fbbf24; --bg: #070b14; --card: #1e293b; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: white; padding-bottom: 80px; }
        
        /* Top Navigation Bar */
        .top-nav { background: #111827; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #374151; }
        .logo-txt { font-weight: 600; font-size: 18px; color: white; }
        .user-badge { color: #22c55e; font-size: 12px; font-weight: bold; }

        /* Balance Card */
        .balance-card { 
            background: linear-gradient(180deg, #1e3a8a 0%, #0f172a 100%); 
            margin: 20px; padding: 40px 20px; border-radius: 30px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-bottom: 5px solid var(--gold);
        }
        .bal-label { font-size: 12px; color: #94a3b8; letter-spacing: 2px; margin-bottom: 10px; }
        .bal-amt { font-size: 36px; color: var(--gold); font-weight: 700; margin-bottom: 20px; }
        
        .recharge-btn { 
            background: var(--gold); color: #070b14; padding: 12px 40px; border-radius: 30px; 
            border: none; font-weight: bold; cursor: pointer; text-transform: uppercase;
        }

        /* Market Section */
        .market-header { padding: 0 20px; display: flex; justify-content: space-between; align-items: center; }
        .market-title { color: var(--gold); font-size: 14px; font-weight: 600; }
        
        .asset-card { 
            background: var(--card); margin: 10px 20px; padding: 18px; border-radius: 20px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .asset-info b { display: block; font-size: 16px; }
        .asset-price { color: #22c55e; text-align: right; }
        .trade-btn { background: #22c55e; color: white; padding: 6px 15px; border-radius: 8px; font-size: 12px; margin-top: 5px; display: inline-block; text-decoration: none; }

        /* Bottom Nav Bar */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; background: #111827; 
            display: flex; justify-content: space-around; padding: 12px 0;
            border-top: 1px solid #374151;
        }
        .nav-item { color: #94a3b8; text-decoration: none; font-size: 11px; text-align: center; }
        .nav-item.active { color: var(--gold); }
        .nav-icon { font-size: 20px; display: block; }
    </style>
</head>
<body>

    <div class="top-nav">
        <span class="logo-txt">pro_investment_Trading</span>
        <span class="user-badge">⚡ User <span id="userName">Rahul</span></span>
    </div>

    <div class="balance-card">
        <h2 style="margin: 0; font-size: 28px; letter-spacing: 1px;">MAKER GOLD</h2>
        <p style="font-size: 10px; color: #94a3b8; margin-bottom: 30px;">PROFESSIONAL TRADING PLATFORM</p>
        
        <div class="bal-label">TOTAL BALANCE</div>
        <div class="bal-amt" id="uBal">₹ 0.00</div>
        
        <button class="recharge-btn" onclick="location.href='deposit.html'">RECHARGE</button>
    </div>

    <div class="market-header">
        <div class="market-title">LIVE MARKET (5-10 MIN TRADE)</div>
        <span style="font-size: 11px; color: #475569;">Real-time</span>
    </div>

    <div class="asset-card">
        <div class="asset-info"><b>BTC/INR</b></div>
        <div class="asset-price">
            <b>₹ 6386795.60</b>
            <a href="trade.html" class="trade-btn">Trade</a>
        </div>
    </div>

    <div class="asset-card">
        <div class="asset-info"><b>ETH/INR</b></div>
        <div class="asset-price">
            <b>₹ 193935.43</b>
            <a href="trade.html" class="trade-btn">Trade</a>
        </div>
    </div>

    <div class="asset-card">
        <div class="asset-info"><b>BNB/INR</b></div>
        <div class="asset-price">
            <b>₹ 52895.58</b>
            <a href="trade.html" class="trade-btn">Trade</a>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="home.html" class="nav-item active"><span class="nav-icon">🏠</span>Home</a>
        <a href="trade.html" class="nav-item"><span class="nav-icon">🎮</span>Win Go</a>
        <a href="promotion.html" class="nav-item"><span class="nav-icon">🎁</span>Invite</a>
        <a href="profile.html" class="nav-item"><span class="nav-icon">👤</span>Mine</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCh-1xi3jkIj5hUsmbm3GFGfT_AlWmxYkk",
            databaseURL: "https://maker-trading-official-default-rtdb.firebaseio.com/"
        };

        // Error handling ke liye try-catch
        try {
            const app = initializeApp(firebaseConfig);
            const db = getDatabase(app);
            const phone = localStorage.getItem("userPhone");

            if(!phone) {
                window.location.href = "login.html";
            } else {
                onValue(ref(db, 'users/' + phone), (snapshot) => {
                    if(snapshot.exists()) {
                        const data = snapshot.val();
                        document.getElementById('uBal').innerText = "₹ " + (data.wallet || 0).toFixed(2);
                        document.getElementById('userName').innerText = phone.slice(-4); // Last 4 digits of phone
                    }
                });
            }
        } catch (error) {
            console.error("Firebase Error:", error);
        }
    </script>
</body>
</html>
