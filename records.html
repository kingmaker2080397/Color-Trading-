<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Records</title>
    <style>
        body { font-family: sans-serif; padding: 15px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        .win { color: green; } .loss { color: red; }
    </style>
</head>
<body>
    <h3>📊 Game History</h3>
    <table>
        <tr style="background:#f4f4f4;"><th>Period</th><th>Selection</th><th>Result</th></tr>
        <tr><td>20260415</td><td>Green</td><td class="win">+₹190.00</td></tr>
        <tr><td>20260414</td><td>Red</td><td class="loss">-₹100.00</td></tr>
    </table>
    <p style="text-align:center; color:#999; font-size:12px; margin-top:20px;">Only last 10 records are shown.</p>
</body>
</html>
