<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Records - Maker Gold</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3b82f6; --bg: #070b14; --card: #1e293b; --win: #22c55e; --loss: #ef4444; --gold: #fbbf24; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: white; padding: 15px; margin: 0; padding-bottom: 50px; }
        
        .header { text-align: center; padding: 25px 0; position: relative; }
        .back-btn { position: absolute; left: 10px; top: 30px; color: var(--gold); text-decoration: none; font-size: 20px; }
        
        /* Stats Header */
        .summary-box { 
            background: linear-gradient(135deg, #1e3a8a 0%, #1e293b 100%); 
            padding: 20px; border-radius: 20px; margin-bottom: 25px; 
            display: flex; justify-content: space-around; border: 1px solid rgba(255,255,255,0.05);
        }
        .stat-item { text-align: center; }
        .stat-item span { display: block; font-size: 10px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
        .stat-item b { font-size: 18px; color: var(--gold); }

        .table-container { 
            background: var(--card); border-radius: 25px; overflow: hidden; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.03); 
        }
        table { width: 100%; border-collapse: collapse; }
        th { background: #0f172a; padding: 15px 10px; text-align: left; color: #94a3b8; font-size: 11px; text-transform: uppercase; }
        td { padding: 18px 10px; border-bottom: 1px solid #334155; font-size: 13px; }
        
        /* Winning/Lossing Styles */
        .win-amount { color: var(--win); font-weight: 600; }
        .loss-amount { color: var(--loss); font-weight: 600; }
        .period-txt { font-family: 'Courier New', monospace; color: #94a3b8; font-size: 12px; }
        
        /* Choice Badges */
        .badge { padding: 5px 10px; border-radius: 8px; font-size: 10px; font-weight: bold; }
        .badge-green { background: rgba(34, 197, 94, 0.15); color: #22c55e; border: 1px solid #22c55e; }
        .badge-red { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid #ef4444; }
        .badge-violet { background: rgba(139, 92, 246, 0.15); color: #a78bfa; border: 1px solid #a78bfa; }
        
        .empty-state { text-align: center; padding: 60px 20px; color: #475569; }
    </style>
</head>
<body>

    <div class="header">
        <a href="home.html" class="back-btn">❮</a>
        <h3 style="margin: 0; color: var(--gold);">Trade History</h3>
        <p style="font-size: 11px; color: #94a3b8; margin-top: 5px;">Your recent 1-minute game results</p>
    </div>

    <div class="summary-box">
        <div class="stat-item">
            <span id="totalBets">0</span>
            <span>Total Bets</span>
        </div>
        <div class="stat-item">
            <span id="winCount" style="color: var(--win);">0</span>
            <span>Wins</span>
        </div>
        <div class="stat-item">
            <span id="winRate">0%</span>
            <span>Win Rate</span>
        </div>
    </div>

    <div class="table-container">
        <table id="historyTable">
            <thead>
                <tr>
                    <th>Period</th>
                    <th>Prediction</th>
                    <th>Result (Net)</th>
                </tr>
            </thead>
            <tbody id="recordsList">
                </tbody>
        </table>
        
        <div id="noData" class="empty-state">
            <div style="font-size: 40px; margin-bottom: 10px;">📉</div>
            <p>No trades recorded yet.<br><small>Start playing to see your history!</small></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCh-1xi3jkIj5hUsmbm3GFGfT_AlWmxYkk",
            databaseURL: "https://maker-trading-official-default-rtdb.firebaseio.com/"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const phone = localStorage.getItem("userPhone");

        if(!phone) window.location.href = "login.html";

        // Fetching records
        const resultsRef = query(ref(db, 'user_history/' + phone), limitToLast(30));

        onValue(resultsRef, (snap) => {
            const list = document.getElementById('recordsList');
            const noData = document.getElementById('noData');
            
            let winCount = 0;
            let totalCount = 0;
            
            list.innerHTML = "";

            if(!snap.exists()) {
                noData.style.display = "block";
                return;
            }

            noData.style.display = "none";
            
            const records = [];
            snap.forEach(child => {
                const data = child.val();
                records.unshift({ id: child.key, ...data });
                
                // Stats Calculation
                totalCount++;
                if(data.status === 'WIN') winCount++;
            });

            // Update UI Stats
            document.getElementById('totalBets').innerText = totalCount;
            document.getElementById('winCount').innerText = winCount;
            document.getElementById('winRate').innerText = totalCount > 0 ? Math.round((winCount/totalCount)*100) + "%" : "0%";

            records.forEach(item => {
                const tr = document.createElement('tr');
                const isWin = item.status === 'WIN';
                
                // Choosing badge class
                let badgeClass = 'badge-green';
                if(item.choice === 'Red') badgeClass = 'badge-red';
                if(item.choice === 'Violet') badgeClass = 'badge-violet';

                tr.innerHTML = `
                    <td class="period-txt">${item.periodId.toString().slice(-5)}</td>
                    <td><span class="badge ${badgeClass}">${item.choice.toUpperCase()}</span></td>
                    <td class="${isWin ? 'win-amount' : 'loss-amount'}">
                        ${isWin ? '+' : '-'} $${parseFloat(item.amount).toFixed(2)}
                    </td>
                `;
                list.appendChild(tr);
            });
        });
    </script>
</body>
</html>
