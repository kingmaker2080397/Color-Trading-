<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Records - Maker Gold</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3b82f6; --bg: #070b14; --card: #1e293b; --win: #22c55e; --loss: #ef4444; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: white; padding: 15px; margin: 0; }
        
        .header { text-align: center; padding: 20px 0; border-bottom: 1px solid #334155; margin-bottom: 20px; }
        
        .table-container { background: var(--card); border-radius: 20px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { background: #0f172a; padding: 15px; text-align: left; color: #94a3b8; font-weight: 600; text-transform: uppercase; font-size: 12px; }
        td { padding: 15px; border-bottom: 1px solid #334155; }
        
        .win { color: var(--win); font-weight: bold; }
        .loss { color: var(--loss); font-weight: bold; }
        .period-id { font-family: monospace; color: #3b82f6; }
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; }
        .badge-green { background: rgba(34, 197, 94, 0.1); color: var(--win); border: 1px solid var(--win); }
        .badge-red { background: rgba(239, 68, 68, 0.1); color: var(--loss); border: 1px solid var(--loss); }
        
        .empty-state { text-align: center; padding: 50px 20px; color: #94a3b8; display: none; }
    </style>
</head>
<body>

    <div class="header">
        <h3 style="margin: 0;">📊 My Game History</h3>
        <p style="font-size: 12px; color: #94a3b8; margin-top: 5px;">Showing your last 20 betting sessions</p>
    </div>

    <div class="table-container">
        <table id="historyTable">
            <thead>
                <tr>
                    <th>Period</th>
                    <th>Select</th>
                    <th>Result</th>
                </tr>
            </thead>
            <tbody id="recordsList">
                </tbody>
        </table>
        
        <div id="noData" class="empty-state">
            <div style="font-size: 40px;">📂</div>
            <p>No betting history found.</p>
        </div>
    </div>

    <p style="text-align:center; color:#475569; font-size:11px; margin-top:30px;">
        Records are synced in real-time with our secure servers.
    </p>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCh-1xi3jkIj5hUsmbm3GFGfT_AlWmxYkk",
            authDomain: "maker-trading-official.firebaseapp.com",
            databaseURL: "https://maker-trading-official-default-rtdb.firebaseio.com/",
            projectId: "maker-trading-official",
            appId: "1:262205995192:web:d7255379855a0fc9489c4d"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const phone = localStorage.getItem("userPhone");

        if(!phone) window.location.href = "login.html";

        // Fetch user results
        const resultsRef = ref(db, 'user_history/' + phone);
        // query and limit to last 20 records for performance
        onValue(resultsRef, (snap) => {
            const list = document.getElementById('recordsList');
            const noData = document.getElementById('noData');
            list.innerHTML = "";

            if(!snap.exists()) {
                noData.style.display = "block";
                return;
            }

            noData.style.display = "none";
            
            // Reverse the keys to show latest on top
            const records = [];
            snap.forEach(child => {
                records.unshift({ id: child.key, ...child.val() });
            });

            records.forEach(item => {
                const tr = document.createElement('tr');
                const isWin = item.status === 'WIN';
                
                tr.innerHTML = `
                    <td class="period-id">${item.periodId}</td>
                    <td><span class="badge ${item.choice === 'Green' ? 'badge-green' : 'badge-red'}">${item.choice.toUpperCase()}</span></td>
                    <td class="${isWin ? 'win' : 'loss'}">
                        ${isWin ? '+' : '-'}₹${parseFloat(item.amount).toFixed(2)}
                    </td>
                `;
                list.appendChild(tr);
            });
        });
    </script>
</body>
</html>
