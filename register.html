<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Maker Gold</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1e3a8a; --gold: #fbbf24; --bg: #070b14; --card: #1e293b; }
        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--bg); 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; color: white;
        }
        .card { 
            background: var(--card); padding: 30px; border-radius: 20px; 
            width: 340px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); 
            text-align: center; border-bottom: 4px solid var(--gold);
        }
        h2 { color: var(--gold); margin-bottom: 20px; }
        input { 
            width: 100%; padding: 14px; margin: 10px 0; 
            border: 1px solid #334155; border-radius: 12px; 
            box-sizing: border-box; background: #0f172a; color: white; outline: none;
        }
        input:focus { border-color: var(--gold); }
        button { 
            width: 100%; padding: 14px; background: var(--gold); 
            color: #070b14; border: none; border-radius: 12px; 
            cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 15px;
        }
        button:disabled { background: #475569; }
        p { color: #94a3b8; font-size: 14px; margin-top: 20px; }
        a { color: var(--gold); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h2>👑 JOIN MAKER</h2>
        <p style="margin-top: -15px; margin-bottom: 20px; color: #94a3b8;">Start your trading journey today</p>
        
        <input type="number" id="regPhone" placeholder="Mobile Number">
        <input type="password" id="regPass" placeholder="Set Password">
        <input type="text" id="inviteCode" placeholder="Invite Code (Optional)">
        
        <button id="regBtn">CREATE ACCOUNT</button>
        
        <p>Already a member? <a href="index.html">Login Now</a></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCh-1xi3jkIj5hUsmbm3GFGfT_AlWmxYkk",
            authDomain: "maker-trading-official.firebaseapp.com",
            databaseURL: "https://maker-trading-official-default-rtdb.firebaseio.com/",
            projectId: "maker-trading-official",
            appId: "1:262205995192:web:d7255379855a0fc9489c4d"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- AUTO INVITE DETECTION ---
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const invite = urlParams.get('invite');
            if(invite) {
                document.getElementById('inviteCode').value = invite;
                document.getElementById('inviteCode').readOnly = true; // Taake user isse change na kare
            }
        };

        document.getElementById('regBtn').onclick = async function() {
            const phone = document.getElementById('regPhone').value.trim();
            const pass = document.getElementById('regPass').value.trim();
            const invite = document.getElementById('inviteCode').value.trim();
            const btn = document.getElementById('regBtn');

            if(phone.length < 10) { alert("Invalid Mobile Number!"); return; }
            if(pass.length < 4) { alert("Password must be at least 4 characters!"); return; }

            btn.disabled = true;
            btn.innerText = "Creating Account...";

            try {
                const snapshot = await get(ref(db, 'users/' + phone));
                
                if (snapshot.exists()) {
                    alert("This number is already registered!");
                    btn.disabled = false;
                    btn.innerText = "CREATE ACCOUNT";
                } else {
                    // Save new user data
                    await set(ref(db, 'users/' + phone), {
                        mobile: phone,
                        password: pass,
                        wallet: 0, // Initial balance
                        kycStatus: "Not Verified",
                        referredBy: invite || "Direct",
                        referralCount: 0,
                        referralIncome: 0,
                        regDate: new Date().toISOString()
                    });

                    // Agar kisi ne refer kiya hai toh uske referralCount ko update karne ka logic admin panel sambhalega
                    
                    alert("Registration Successful! Please Login.");
                    window.location.href = "index.html";
                }
            } catch (error) {
                console.error(error);
                alert("Network Error! Please try again.");
                btn.disabled = false;
                btn.innerText = "CREATE ACCOUNT";
            }
        };
    </script>
</body>
</html>
