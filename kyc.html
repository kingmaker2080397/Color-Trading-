<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KYC Verification - Maker Gold</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #070b14; color: white; font-family: 'Poppins', sans-serif; padding: 20px; text-align: center; }
        .card { background: #1e293b; padding: 25px; border-radius: 20px; border: 1px solid #fbbf24; max-width: 400px; margin: auto; }
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: #fbbf24; color: #070b14; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        #preview { width: 100%; max-height: 200px; object-fit: contain; margin: 15px 0; border-radius: 10px; display: none; border: 1px dashed #fbbf24; }
        .status-msg { display: none; padding: 20px; background: rgba(251, 191, 36, 0.1); border-radius: 15px; border: 1px solid #fbbf24; color: #fbbf24; }
    </style>
</head>
<body>

    <div id="kycForm" class="card">
        <h2 style="color:#fbbf24;">🆔 Identity Verification</h2>
        <p style="font-size: 13px; color: #94a3b8;">Upload your ID Card to enable withdrawals</p>
        
        <input type="text" id="fullName" placeholder="Full Name (As per ID)">
        <input type="text" id="idNum" placeholder="ID Card Number">
        
        <div style="text-align: left; font-size: 12px; color: #fbbf24; margin-left: 5px;">Upload ID Card Front Photo:</div>
        <input type="file" id="idFile" accept="image/*" onchange="previewImg(event)">
        <img id="preview">

        <button class="btn" id="subBtn" onclick="submitKYC()">UPLOAD & SUBMIT</button>
    </div>

    <div id="pendingBox" class="status-msg">
        <h1 style="font-size: 50px;">⏳</h1>
        <h3>KYC PENDING</h3>
        <p>Admin is reviewing your documents. Please wait 24-48 hours.</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, update, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCh-1xi3jkIj5hUsmbm3GFGfT_AlWmxYkk",
            databaseURL: "https://maker-trading-official-default-rtdb.firebaseio.com/" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const phone = localStorage.getItem("userPhone");

        // Check current status
        onValue(ref(db, 'users/' + phone), (snap) => {
            if(snap.val() && snap.val().kycStatus === "Pending") {
                document.getElementById('kycForm').style.display = 'none';
                document.getElementById('pendingBox').style.display = 'block';
            }
        });

        window.previewImg = (e) => {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = () => {
                    const img = document.getElementById('preview');
                    img.src = reader.result;
                    img.style.display = 'block';
                }
                reader.readAsDataURL(file);
            }
        };

        window.submitKYC = async () => {
            const file = document.getElementById('idFile').files[0];
            const name = document.getElementById('fullName').value;
            const idNo = document.getElementById('idNum').value;
            const btn = document.getElementById('subBtn');

            if(!file || !name || !idNo) return alert("Please fill all details!");

            btn.disabled = true;
            btn.innerText = "Uploading to Server...";

            // ImgBB Upload
            const formData = new FormData();
            formData.append("image", file);
            
            try {
                const res = await fetch("https://api.imgbb.com/1/upload?key=8730f0f37b6703c530e137682f9d6b7b", {
                    method: "POST",
                    body: formData
                });
                const data = await res.json();
                const url = data.data.url;

                // Save to Firebase
                await update(ref(db, 'kyc_requests/' + phone), {
                    phone: phone, name: name, idNumber: idNo, photoUrl: url, time: Date.now()
                });
                await update(ref(db, 'users/' + phone), { kycStatus: "Pending" });

                alert("Submitted! Wait for approval.");
                location.reload();
            } catch (err) {
                alert("Upload failed! Try again.");
                btn.disabled = false;
                btn.innerText = "UPLOAD & SUBMIT";
            }
        };
    </script>
</body>
    </html>
