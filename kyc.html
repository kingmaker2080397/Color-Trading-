<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KYC Verification - Maker Gold</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #070b14; color: white; font-family: 'Poppins', sans-serif; padding: 20px; text-align: center; }
        .card { background: #1e293b; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border-bottom: 4px solid #3b82f6; }
        input, select { 
            width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; 
            border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; outline: none;
        }
        .btn { 
            width: 100%; padding: 15px; background: #3b82f6; color: white; 
            border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn:disabled { background: #475569; }
        
        /* Status Cards */
        .status-card { display: none; padding: 30px; border-radius: 20px; margin-top: 20px; }
        .verified { background: rgba(34, 197, 94, 0.1); border: 2px solid #22c55e; color: #22c55e; }
        .pending { background: rgba(251, 191, 36, 0.1); border: 2px solid #fbbf24; color: #fbbf24; }
    </style>
</head>
<body>

    <div id="formBox" class="card">
        <h2 style="color:#fbbf24;">🆔 Identity Verification</h2>
        <p style="font-size: 13px; color: #94a3b8; margin-bottom: 20px;">Complete KYC to enable withdrawals</p>
        
        <input type="text" id="fullName" placeholder="Full Name (As per ID)">
        <select id="country">
            <option value="PK">Pakistan 🇵🇰</option>
            <option value="IN">India 🇮🇳</option>
            <option value="BD">Bangladesh 🇧🇩</option>
            <option value="US">USA 🇺🇸</option>
        </select>
        <input type="text" id="idNum" placeholder="CNIC / Aadhar / ID Number">
        
        <button id="subBtn" class="btn" onclick="submitKYC()">SUBMIT DETAILS</button>
    </div>

    <div id="pendingBox" class="status-card pending">
        <h1 style="font-size:50px; margin:0;">⏳</h1>
        <h2>KYC PENDING</h2>
        <p>Admin is reviewing your documents. Please wait 24-48 hours.</p>
    </div>

    <div id="verifiedBox" class="status-card verified">
        <h1 style="font-size:50px; margin:0;">✅</h1>
        <h2>VERIFIED</h2>
        <p>Your identity is confirmed. Withdrawals are now active.</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCh-1xi3jkIj5hUsmbm3GFGfT_AlWmxYkk",
            authDomain: "maker-trading-official.firebaseapp.com",
            databaseURL: "https://maker-trading-official-default-rtdb.firebaseio.com/",
            projectId: "maker-trading-official",
            appId: "1:262205995192:web:d7255379855a0fc9489c4d"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const phone = localStorage.getItem("userPhone");

        if(!phone) window.location.href = "login.html";

        // Check Existing KYC Status
        onValue(ref(db, 'users/' + phone), (snap) => {
            if(snap.exists()){
                const status = snap.val().kycStatus;
                if(status === "Pending") {
                    document.getElementById('formBox').style.display = 'none';
                    document.getElementById('pendingBox').style.display = 'block';
                } else if(status === "Verified") {
                    document.getElementById('formBox').style.display = 'none';
                    document.getElementById('verifiedBox').style.display = 'block';
                }
            }
        });

        window.submitKYC = async () => {
            const name = document.getElementById('fullName').value.trim();
            const id = document.getElementById('idNum').value.trim();
            const country = document.getElementById('country').value;
            const btn = document.getElementById('subBtn');

            if(name.length < 3 || id.length < 5) {
                alert("Please enter valid details!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "SUBMITTING...";

            try {
                // 1. Update User Status
                await update(ref(db, 'users/' + phone), {
                    kycStatus: "Pending",
                    fullName: name,
                    idNumber: id,
                    country: country
                });

                // 2. Add to Admin KYC Review List
                await update(ref(db, 'kyc_requests/' + phone), {
                    phone: phone,
                    name: name,
                    idNumber: id,
                    timestamp: Date.now()
                });

                alert("KYC Submitted Successfully!");
            } catch (e) {
                alert("Error! Try again.");
                btn.disabled = false;
                btn.innerText = "SUBMIT DETAILS";
            }
        };
    </script>
</body>
        </html>
