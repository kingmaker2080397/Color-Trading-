<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KYC - Verification</title>
</head>
<body style="font-family: sans-serif; padding: 20px; background: #f4f4f4;">
    <div style="background: white; padding: 20px; border-radius: 10px;">
        <h3>KYC Verification</h3>
        <p>Please upload your ID card details to enable withdrawals.</p>
        <label>Full Name:</label><br><input type="text" style="width:100%; padding:10px; margin:10px 0;"><br>
        <label>ID Card Number:</label><br><input type="number" style="width:100%; padding:10px; margin:10px 0;"><br>
        <label>Upload ID Front (Screenshot):</label><br><input type="file" style="margin:10px 0;"><br>
        <button onclick="alert('Submitted for review!')" style="width:100%; padding:15px; background:green; color:white; border:none; border-radius:8px;">Submit KYC</button>
    </div>
</body>
</html>
